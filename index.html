<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#121214;--surface:#1C1C20;--sh:#252529;--card:#1F1F24;--accent:#F0C040;--ok:#34D399;--err:#F87171;--text:#F4F4F6;--dim:#C4C4CC;--muted:#8E8E9A;--border:#363640;--pinyin:#7DB8FC;--hanzi:#C8A0FC;--hsk1:#7DB8FC;--hsk2:#B89CFA;--notes:#FCD34D}
body{font-family:'Noto Sans','Noto Sans SC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:520px;margin:0 auto;padding-bottom:40px}
.mono{font-family:'Space Mono',monospace}
button{font-family:inherit;cursor:pointer;transition:all .15s;color:inherit}
input{font-family:inherit}
.header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.header .back{background:none;border:none;color:var(--accent);font-size:22px;padding:4px;line-height:1}
.header .t{font-size:16px;font-weight:700;letter-spacing:.02em}
.header .s{font-size:11px;color:var(--dim);margin-top:1px}
.pbar{height:3px;background:var(--border);border-radius:2px;margin:8px 20px 0}
.pbar .fill{height:3px;background:var(--accent);border-radius:2px;transition:width .3s}
.pill{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:12px}
.pill.on{border-color:var(--accent);background:rgba(240,192,64,.15);color:var(--accent);font-weight:600}
.mbtn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-align:left;width:100%;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.mbtn:hover{background:var(--sh);border-color:var(--accent)}
.fcard{width:100%;max-width:380px;min-height:240px;background:var(--card);border:1px solid var(--border);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:28px;text-align:center;transition:all .3s;margin:0 auto;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.bp{padding:11px 24px;border-radius:10px;background:var(--accent);color:#121214;border:none;font-size:14px;font-weight:700}
.bp:disabled{background:var(--border);color:var(--muted);cursor:default}
.tinput{width:100%;padding:12px 16px;border-radius:10px;font-size:15px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tinput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,192,64,.18)}
.chip{padding:7px 12px;border-radius:8px;font-size:15px;font-weight:600;border:1px solid;display:inline-block}
.sarea{min-height:50px;padding:10px;border-radius:12px;border:1px dashed var(--muted);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:7px}
.mpair{padding:12px 10px;border-radius:10px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);text-align:center;width:100%;transition:all .15s}
.les-card{padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);width:100%;text-align:left;display:flex;gap:14px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.les-card:hover{background:var(--sh);border-color:var(--accent)}
.les-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:.04em}
.py-text{font-family:'Noto Sans','Segoe UI',sans-serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .25s ease}
</style>
</head>

"H1L1":[
  {title:"是 (shì) — to be",examples:[

  {title:"吗 (ma) — yes/no questions",examples:[
    {cn:"你是老师吗？",py:"Nǐ shì lǎoshī ma?",en:"Are you a teacher?"},

  ],note:"Add 吗 to the end of any statement to make it a yes/no question. No word order change needed. Answer with the verb: 是 (yes) or 不是 (no)."},

    {cn:"我不是老师。",py:"Wǒ bú shì lǎoshī.",en:"I am not a teacher."},

  ],note:"Place 不 before the verb to negate. Tone change: 不 is normally 4th tone (bù) but changes to 2nd tone (bú) before another 4th tone word like 是."},

"H1L2":[
  {title:"叫 (jiào) — to be called",examples:[

"H1L3":[
  {title:"有 (yǒu) — to have / there is",examples:[

  {title:"几 (jǐ) — how many (small numbers)",examples:[

"H1L4":[
  {title:"Date format: year → month → day",examples:[

"H1L5":[
  {title:"做什么工作 — asking about jobs",examples:[

  ],note:"Two ways to ask: 你做什么工作？(direct) or 你是做什么工作的？(emphatic with 是…的). Answer with 我是 + job or 我在 + place + 工作."},
  {title:"在 (zài) + place + verb",examples:[

"H1L6":[
  {title:"会 (huì) — learned ability",examples:[
    {cn:"我会说汉语。",py:"Wǒ huì shuō Hànyǔ.",en:"I can speak Chinese."},
    {cn:"她不会做饭。",py:"Tā bú huì zuòfàn.",en:"She can't cook."},
    {cn:"你会写汉字吗？",py:"Nǐ huì xiě Hànzì ma?",en:"Can you write Chinese characters?"},
  ],note:"会 = a learned skill/ability. 会说 (can speak), 会做 (can make), 会写 (can write). Negative: 不会. Compare: 能 = physical ability or permission, 可以 = permission (more formal)."},
  {title:"一点儿 (yìdiǎnr) vs 有点儿 (yǒudiǎnr)",examples:[
    {cn:"我会说一点儿汉语。",py:"Wǒ huì shuō yìdiǎnr Hànyǔ.",en:"I can speak a little Chinese."},
    {cn:"这个有点儿贵。",py:"Zhège yǒudiǎnr guì.",en:"This is a bit expensive."},
  ],note:"一点儿 goes AFTER the verb (neutral): 吃一点儿 (eat a little). 有点儿 goes BEFORE adjectives (slightly negative): 有点儿累 (a bit tired), 有点儿难 (a bit difficult). Don't mix them up!"},
,
  {title:"在 (zài) — at / in / ongoing action",examples:[
    {cn:"我在学汉语。",py:"Wǒ zài xué Hànyǔ.",en:"I am learning Chinese."},
    {cn:"他在家。",py:"Tā zài jiā.",en:"He is at home."},
    {cn:"你在做什么？",py:"Nǐ zài zuò shénme?",en:"What are you doing?"},
  ],note:"在 has two key uses: 1) Location: 在 + place = 'at/in'. 我在学校 (I'm at school). 2) Ongoing action: 在 + verb = '-ing'. 我在吃饭 (I'm eating). This second use is like English progressive tense."}],
"H1L7":[
  {title:"Location words (方位词)",examples:[

    {cn:"椅子下面",py:"yǐzi xiàmiàn",en:"under the chair"},

    {cn:"房间里面",py:"fángjiān lǐmiàn",en:"inside the room"},
  ],note:"Location words come AFTER the reference noun (opposite of English): 桌子上 = on the table. Key pairs: 上/下 (above/below), 前/后 (front/back), 里/外 (inside/outside), 左/右 (left/right)."},

"H1L8":[
  {title:"Telling time",examples:[
    {cn:"现在三点半。",py:"Xiànzài sān diǎn bàn.",en:"It's 3:30 now."},
    {cn:"下午两点十五分。",py:"Xiàwǔ liǎng diǎn shíwǔ fēn.",en:"2:15 PM."},
    {cn:"晚上八点一刻。",py:"Wǎnshang bā diǎn yí kè.",en:"8:15 in the evening."},
  ],note:"Number + 点 (o'clock) + Number + 分 (minutes). Shortcuts: 半 (bàn) = :30, 一刻 (yí kè) = :15. Time ALWAYS goes before the verb: 我三点去 (I go at 3)."},
  {title:"Time before verb (时间在动词前)",examples:[
    {cn:"我八点上课。",py:"Wǒ bā diǎn shàngkè.",en:"I have class at 8."},

    {cn:"我明天去。",py:"Wǒ míngtiān qù.",en:"I'm going tomorrow."},
  ],note:"In Chinese, ALL time expressions go before the verb. This includes clock times, days, dates — everything. 我明天三点去学校 = I tomorrow 3 o'clock go school."},
],
"H1L9":[
  {title:"想 (xiǎng) + verb — want to",examples:[
    {cn:"你想吃什么？",py:"Nǐ xiǎng chī shénme?",en:"What do you want to eat?"},
    {cn:"我想喝咖啡。",py:"Wǒ xiǎng hē kāfēi.",en:"I want to drink coffee."},
    {cn:"我不想去。",py:"Wǒ bù xiǎng qù.",en:"I don't want to go."},
  ],note:"想 + verb = 'want to / would like to'. Softer and more polite than 要 (yào). Negative: 不想 (don't want to). 你想做什么？= What do you want to do?"},
  {title:"来 (lái) for ordering",examples:[
    {cn:"来一杯咖啡。",py:"Lái yì bēi kāfēi.",en:"A coffee please."},

  ],note:"来 is used casually to order in restaurants. More natural than 我要. Just say 来 + amount + item. Literally means 'bring/come' but functions as 'I'll have…'."},

"H1L10":[
  {title:"能 (néng) — can / able to",examples:[
    {cn:"我能坐这儿吗？",py:"Wǒ néng zuò zhèr ma?",en:"Can I sit here?"},
    {cn:"你能帮我吗？",py:"Nǐ néng bāng wǒ ma?",en:"Can you help me?"},
    {cn:"今天不能去。",py:"Jīntiān bù néng qù.",en:"Can't go today."},
  ],note:"能 asks permission or indicates possibility/capability. Compare the 'can' trio: 会 = learned skill (I can swim), 能 = ability/permission (Can I sit here?), 可以 = permission, slightly formal (You may enter)."},
],
"H1L11":[
  {title:"坐 (zuò) + vehicle — taking transport",examples:[
    {cn:"我坐地铁去上班。",py:"Wǒ zuò dìtiě qù shàngbān.",en:"I take the subway to work."},

    {cn:"我们坐出租车去吧。",py:"Wǒmen zuò chūzūchē qù ba.",en:"Let's take a taxi."},
  ],note:"坐 (sit) + vehicle for taking transport: 坐飞机, 坐火车, 坐地铁, 坐公共汽车. Exceptions: 开车 (drive), 走路 (walk), 骑自行车 (ride a bike). Pattern: 坐 + vehicle + 去/来 + place."},
  {title:"怎么 (zěnme) — how",examples:[
    {cn:"你怎么去学校？",py:"Nǐ zěnme qù xuéxiào?",en:"How do you get to school?"},
    {cn:"这个字怎么写？",py:"Zhège zì zěnme xiě?",en:"How do you write this character?"},
  ],note:"怎么 goes before the verb to ask 'how'. It can also express surprise meaning 'how come/why': 你怎么不吃了？(Why aren't you eating?)."},
],
"H1L12":[
  {title:"多少钱 — how much",examples:[
    {cn:"这个多少钱？",py:"Zhège duōshao qián?",en:"How much is this?"},
    {cn:"三十块。",py:"Sānshí kuài.",en:"30 yuan."},
    {cn:"太贵了，便宜一点儿吧。",py:"Tài guì le, piányi yìdiǎnr ba.",en:"Too expensive, cheaper please."},
  ],note:"多少钱 asks price. Answer: number + 块 (kuài, casual for 元). Bargaining: 太贵了 + 便宜一点儿 (cheaper please). 多少 doesn't need a measure word, unlike 几."},
  {title:"太…了 — too much",examples:[
    {cn:"太贵了！",py:"Tài guì le!",en:"Too expensive!"},
    {cn:"太好了！",py:"Tài hǎo le!",en:"That's great! / Too good!"},
    {cn:"太冷了。",py:"Tài lěng le.",en:"It's too cold."},
  ],note:"太 + adjective + 了 = 'too / extremely'. Can be negative (太贵了 = too expensive) or positive (太好了 = wonderful!). Context determines whether it's a complaint or praise."},
],
"H1L13":[
  {title:"很/非常 + adjective",examples:[
    {cn:"这个菜很好吃。",py:"Zhège cài hěn hǎochī.",en:"This dish is delicious."},
    {cn:"他非常忙。",py:"Tā fēicháng máng.",en:"He is extremely busy."},
  ],note:"很 is almost always required before adjectives, even when you don't mean 'very'. Without 很, an adjective implies comparison: 他高 = He is tall(er). 很 is neutral; 非常 is truly emphatic 'extremely'."},
  {title:"也 (yě) and 都 (dōu) — also / all",examples:[
    {cn:"我也喜欢。",py:"Wǒ yě xǐhuan.",en:"I also like it."},
    {cn:"我们都是学生。",py:"Wǒmen dōu shì xuésheng.",en:"We are all students."},
    {cn:"他们也都喜欢。",py:"Tāmen yě dōu xǐhuan.",en:"They all also like it."},
  ],note:"也 (also) and 都 (all/both) go BEFORE the verb. When combined: 也 comes first, then 都. 都 implies 'every single one, no exception'. 我们都去 = We ALL go."},
],
"H1L14":[
  {title:"过 (guo) — past experience",examples:[
    {cn:"你去过中国吗？",py:"Nǐ qùguo Zhōngguó ma?",en:"Have you been to China?"},
    {cn:"我去过两次。",py:"Wǒ qùguo liǎng cì.",en:"I've been twice."},
    {cn:"我没吃过火锅。",py:"Wǒ méi chīguo huǒguō.",en:"I've never eaten hotpot."},
  ],note:"Verb + 过 = 'have done (at some point in life)'. Focus on whether the experience exists, not when. Negative: 没 + verb + 过. Compare: 了 marks a specific completed action; 过 marks life experience."},
  {title:"了 (le) — completion",examples:[
    {cn:"我吃了。",py:"Wǒ chī le.",en:"I ate. / I've eaten."},
    {cn:"他买了一本书。",py:"Tā mǎi le yì běn shū.",en:"He bought a book."},
    {cn:"她没来。",py:"Tā méi lái.",en:"She didn't come."},
  ],note:"Verb + 了 = completed action. 我看了那个电影 (I watched that movie — specific event). Negative: 没 + verb (drop the 了). Different from 过 which is about lifetime experience."},
],
"H1L15":[
  {title:"怎么样 (zěnmeyàng) — how is it",examples:[
    {cn:"今天天气怎么样？",py:"Jīntiān tiānqì zěnmeyàng?",en:"How is the weather today?"},
    {cn:"这个菜怎么样？",py:"Zhège cài zěnmeyàng?",en:"How is this dish?"},
    {cn:"明天下午怎么样？",py:"Míngtiān xiàwǔ zěnmeyàng?",en:"How about tomorrow afternoon?"},
  ],note:"怎么样 asks for opinions/conditions: 'how is it?' or 'what about...?'. Also used as a suggestion: 我们去吃饭怎么样？(How about we go eat?). Very versatile."},
  {title:"可能 (kěnéng) — maybe / possibly",examples:[
    {cn:"今天可能要下雨。",py:"Jīntiān kěnéng yào xiàyǔ.",en:"It might rain today."},
    {cn:"他可能不来了。",py:"Tā kěnéng bù lái le.",en:"He probably won't come."},
  ],note:"可能 goes before the verb for 'maybe/possibly'. Can also stand alone: 可能吧 (maybe so). Negative: 不可能 (impossible!)."},
],
"H2L1":[
  {title:"要 (yào) — want / need / will",examples:[
    {cn:"我要去北京。",py:"Wǒ yào qù Běijīng.",en:"I want to go to Beijing."},
    {cn:"你要多休息。",py:"Nǐ yào duō xiūxi.",en:"You need to rest more."},
    {cn:"明天要下雨。",py:"Míngtiān yào xiàyǔ.",en:"It's going to rain tomorrow."},
  ],note:"要 has three meanings: 1) want/desire: 我要喝水, 2) need/should: 你要学习, 3) will/about to: 要下雨了. To say 'don't want': use 不想 (NOT 不要, which means 'Don't!' as a command)."},
  {title:"最 (zuì) — most / superlative",examples:[
    {cn:"九月去最好。",py:"Jiǔ yuè qù zuì hǎo.",en:"Going in September is best."},
    {cn:"我最喜欢踢足球。",py:"Wǒ zuì xǐhuan tī zúqiú.",en:"I like football the most."},
    {cn:"她的眼睛最漂亮。",py:"Tā de yǎnjing zuì piàoliang.",en:"Her eyes are the most beautiful."},
  ],note:"最 + adjective/verb = superlative (-est/most). 最好 (best), 最大 (biggest), 最喜欢 (like most). Goes directly before what it modifies."},
  {title:"几 and 多 — approximate numbers",examples:[
    {cn:"六个多月。",py:"Liù gè duō yuè.",en:"More than 6 months."},
    {cn:"三千多块。",py:"Sānqiān duō kuài.",en:"More than 3,000 yuan."},
    {cn:"几个人",py:"jǐ gè rén",en:"several people"},
  ],note:"Number + 多 = 'more than X': 三十多 (30+), 两个多小时 (2+ hours). 几 before a measure word = 'several' (not a question): 几个朋友 (a few friends)."},
],
"H2L2":[
  {title:"是不是 — confirmation questions",examples:[
    {cn:"你是不是喜欢运动？",py:"Nǐ shì bu shì xǐhuan yùndòng?",en:"You like sports, right?"},
    {cn:"他是不是你哥哥？",py:"Tā shì bu shì nǐ gēge?",en:"Is he your brother?"},
  ],note:"是不是 seeks confirmation ('...right?'). More casual than 吗. Can go at the beginning, middle, or end of the sentence. The speaker expects 'yes'."},
  {title:"每 (měi) — every",examples:[
    {cn:"我每天早上跑步。",py:"Wǒ měi tiān zǎoshang pǎobù.",en:"I jog every morning."},
    {cn:"每个人都喜欢。",py:"Měi gè rén dōu xǐhuan.",en:"Everyone likes it."},
    {cn:"他每天都很忙。",py:"Tā měi tiān dōu hěn máng.",en:"He's busy every day."},
  ],note:"每 + MW + noun = 'every'. 每天 (every day), 每个人 (everyone), 每次 (every time). Usually paired with 都: 我每天都… (I every day all…). This 每…都 pattern is very common."},
  {title:"多 (duō) + adjective — how [adj]?",examples:[
    {cn:"他多大了？",py:"Tā duō dà le?",en:"How old is he?"},
    {cn:"你多高？",py:"Nǐ duō gāo?",en:"How tall are you?"},
    {cn:"学校离这儿多远？",py:"Xuéxiào lí zhèr duō yuǎn?",en:"How far is the school from here?"},
  ],note:"多 + positive adjective asks 'how [adj]?'. Always use the positive form: 多大 (not 多小), 多高 (not 多矮), 多远 (not 多近). Very common for asking measurements."},
],
"H2L3":[
  {title:"的 (de) — possessive and descriptive phrases",examples:[
    {cn:"红色的是我的。",py:"Hóngsè de shì wǒ de.",en:"The red one is mine."},
    {cn:"新的比旧的贵。",py:"Xīn de bǐ jiù de guì.",en:"New ones are more expensive than old ones."},
    {cn:"送牛奶的来了。",py:"Sòng niúnǎi de lái le.",en:"The milk delivery person came."},
  ],note:"的 creates noun phrases: adjective + 的 = 'the [adj] one'. Also: verb + 的 = 'the one who [verb]s'. When meaning is clear, the noun after 的 can be dropped: 我的 = mine, 红色的 = the red one."},
  {title:"一下 (yíxià) — briefly / a moment",examples:[
    {cn:"我看一下。",py:"Wǒ kàn yíxià.",en:"Let me take a look."},
    {cn:"请等一下。",py:"Qǐng děng yíxià.",en:"Please wait a moment."},
    {cn:"你试一下。",py:"Nǐ shì yíxià.",en:"Give it a try."},
  ],note:"Verb + 一下 softens the action, making it brief or polite: 想一下 (think briefly), 看一下 (take a quick look). Essential for polite requests. Much softer than bare verb commands."},
  {title:"真 (zhēn) — really / truly",examples:[
    {cn:"这个房间真漂亮！",py:"Zhège fángjiān zhēn piàoliang!",en:"This room is really beautiful!"},
    {cn:"今天真冷。",py:"Jīntiān zhēn lěng.",en:"Today is really cold."},
  ],note:"真 + adj = 'really/truly'. Stronger than 很, works like an exclamation. 真好！(Really good!), 真贵 (Really expensive!). Natural in spoken Chinese for expressing genuine feeling."},
],
"H2L4":[
  {title:"是…的 (shì…de) — emphasis structure",examples:[
    {cn:"这个工作是他帮我介绍的。",py:"Zhège gōngzuò shì tā bāng wǒ jièshào de.",en:"He's the one who recommended me for this job."},
    {cn:"你是怎么来的？",py:"Nǐ shì zěnme lái de?",en:"How did you get here?"},
    {cn:"我是坐飞机来的。",py:"Wǒ shì zuò fēijī lái de.",en:"I came by plane."},
  ],note:"是…的 emphasizes HOW, WHEN, WHERE, or WHO of a past action. Focus is on the circumstance, not the action itself. Very common in Chinese — use it whenever you want to highlight a detail about something that already happened."},
  {title:"…的时候 (de shíhou) — when / while",examples:[
    {cn:"吃饭的时候不要看手机。",py:"Chīfàn de shíhou bú yào kàn shǒujī.",en:"Don't look at your phone while eating."},
    {cn:"你来的时候告诉我。",py:"Nǐ lái de shíhou gàosu wǒ.",en:"Tell me when you come."},
  ],note:"Verb/noun + 的时候 = 'when/while doing X'. Goes at the beginning of the sentence: 下雨的时候我在家 (When it rained, I was at home). Similar to English 'when' or 'at the time of'."},
  {title:"已经 (yǐjīng) — already",examples:[
    {cn:"我已经工作两年了。",py:"Wǒ yǐjīng gōngzuò liǎng nián le.",en:"I've already been working for 2 years."},
    {cn:"他已经走了。",py:"Tā yǐjīng zǒu le.",en:"He's already left."},
  ],note:"已经 goes before the verb, often paired with 了 at the end. Shows completion or that something has reached a point: 已经十点了 (It's already 10 o'clock)."},
],
"H2L5":[
  {title:"就 (jiù) — then / just / only",examples:[
    {cn:"就买这件吧。",py:"Jiù mǎi zhè jiàn ba.",en:"Let's just buy this one."},
    {cn:"就三块钱。",py:"Jiù sān kuài qián.",en:"Only 3 yuan."},
    {cn:"我们就去吧。",py:"Wǒmen jiù qù ba.",en:"Let's just go then."},
  ],note:"就 is very versatile: 1) 'just/simply': 就买这个, 2) 'only' (before numbers): 就两个人, 3) 'then/so': 那就走吧. It implies decisiveness, speed, or smallness of amount."},
  {title:"还 (hái) — still / also / else",examples:[
    {cn:"还要别的吗？",py:"Hái yào biéde ma?",en:"Want anything else?"},
    {cn:"他还在睡觉。",py:"Tā hái zài shuìjiào.",en:"He's still sleeping."},
    {cn:"还可以。",py:"Hái kěyǐ.",en:"Not bad. / Still OK."},
  ],note:"还 means 'still' (continuing), 'also' (in addition), or 'else' (more). 还有吗？(Anything else?), 还不错 (not bad). Different from 也: 还 implies continuation or addition to what exists."},
  {title:"有点儿 (yǒudiǎnr) — a bit (negative)",examples:[
    {cn:"这件有点儿贵。",py:"Zhè jiàn yǒudiǎnr guì.",en:"This one is a bit expensive."},
    {cn:"今天有点儿冷。",py:"Jīntiān yǒudiǎnr lěng.",en:"Today is a bit cold."},
    {cn:"我有点儿累。",py:"Wǒ yǒudiǎnr lèi.",en:"I'm a bit tired."},
  ],note:"有点儿 goes BEFORE adjectives and carries a slightly negative or complaining tone. 有点儿贵 (a bit too expensive), 有点儿难 (a bit too hard). DON'T confuse with 一点儿 which goes AFTER verbs and is neutral."},
],
"H2L6":[
  {title:"怎么 as 'how come / why' (surprise)",examples:[
    {cn:"你怎么不吃了？",py:"Nǐ zěnme bù chī le?",en:"How come you stopped eating?"},
    {cn:"你怎么来了？",py:"Nǐ zěnme lái le?",en:"How come you're here?"},
  ],note:"Besides asking 'how' (method), 怎么 can express surprise: 'how come / why'. Tone and context determine meaning. 你怎么去？(How do you go?) vs 你怎么来了？(Why are you here? — I'm surprised!)."},
  {title:"因为…所以… (yīnwèi…suǒyǐ…)",examples:[
    {cn:"因为下雨，所以我没去。",py:"Yīnwèi xiàyǔ, suǒyǐ wǒ méi qù.",en:"Because it rained, I didn't go."},
    {cn:"因为他经常运动，所以身体很好。",py:"Yīnwèi tā jīngcháng yùndòng, suǒyǐ shēntǐ hěn hǎo.",en:"Because he exercises often, he's very healthy."},
  ],note:"因为 (because) and 所以 (therefore) are often used TOGETHER in one sentence — unlike English where you pick one. You can drop either half if meaning is clear. This pairing is very natural in Chinese."},
],
"H2L7":[
  {title:"离 (lí) — distance from",examples:[
    {cn:"你家离公司远吗？",py:"Nǐ jiā lí gōngsī yuǎn ma?",en:"Is your home far from work?"},
    {cn:"学校离我家很近。",py:"Xuéxiào lí wǒ jiā hěn jìn.",en:"School is close to my home."},
    {cn:"从这儿到机场很远。",py:"Cóng zhèr dào jīchǎng hěn yuǎn.",en:"It's far from here to the airport."},
  ],note:"A + 离 + B + 远/近 = A is far/close from B. Always followed by 远 (far) or 近 (near), or a specific distance/time. Compare with 从…到… (from…to…) which indicates a route."},
],
"H2L8":[
  {title:"再 (zài) — again (future)",examples:[
    {cn:"让我想想再告诉你。",py:"Ràng wǒ xiǎngxiang zài gàosu nǐ.",en:"Let me think then I'll tell you."},
    {cn:"请再说一遍。",py:"Qǐng zài shuō yí biàn.",en:"Please say it once more."},
    {cn:"再见！",py:"Zàijiàn!",en:"Goodbye! (= see again)"},
  ],note:"再 = 'again' for FUTURE actions or 'then/after that'. 我再想想 (Let me think again). Different from 又 (yòu) which is 'again' for past events. 再 implies 'not yet, but will'."},
  {title:"Verb reduplication — softening",examples:[
    {cn:"想想",py:"xiǎngxiang",en:"think about it"},
    {cn:"看看",py:"kànkan",en:"take a look"},
    {cn:"试试",py:"shìshi",en:"give it a try"},
    {cn:"休息休息",py:"xiūxi xiūxi",en:"take a rest"},
  ],note:"Repeating a verb makes it casual and brief: 看看 (have a look), 想想 (think a bit). For 2-syllable verbs: 休息休息, 介绍介绍. Much more polite than bare commands. Essential for natural speech."},
],
"H2L9":[
  {title:"Result complements (结果补语)",examples:[
    {cn:"我没做完。",py:"Wǒ méi zuòwán.",en:"I didn't finish."},
    {cn:"你听懂了吗？",py:"Nǐ tīngdǒng le ma?",en:"Did you understand (what you heard)?"},
    {cn:"我做错了。",py:"Wǒ zuòcuò le.",en:"I got it wrong."},
    {cn:"你看见他了吗？",py:"Nǐ kànjiàn tā le ma?",en:"Did you see him?"},
  ],note:"Result complements attach to verbs showing the OUTCOME: 做完 (finish), 听懂 (understand by listening), 做错 (do wrong), 看见 (see = look + perceive), 找到 (find = search + arrive). Negative: 没 + verb + complement. Extremely common in Chinese!"},
  {title:"从 (cóng) — from",examples:[
    {cn:"从九点开始上班。",py:"Cóng jiǔ diǎn kāishǐ shàngbān.",en:"Start work from 9."},
    {cn:"从北京到上海。",py:"Cóng Běijīng dào Shànghǎi.",en:"From Beijing to Shanghai."},
  ],note:"从 indicates a starting point in time or space. Often paired with 到 (to): 从…到… = from…to…. 从早上到晚上 (from morning to evening)."},
  {title:"第 (dì) — ordinal numbers",examples:[
    {cn:"第一个问题。",py:"Dì yī gè wèntí.",en:"The first question."},
    {cn:"他是第二。",py:"Tā shì dì èr.",en:"He is second."},
  ],note:"第 + number = ordinal: 第一 (1st), 第二 (2nd), 第三 (3rd). Always need 第 — can't say 一个问题 for 'first question' (that means 'one question')."},
],
"H2L10":[
  {title:"别/不要…了 — stop doing / don't",examples:[
    {cn:"别找了！",py:"Bié zhǎo le!",en:"Stop looking!"},
    {cn:"不要玩手机了。",py:"Bú yào wán shǒujī le.",en:"Stop playing with the phone."},
    {cn:"别说话。",py:"Bié shuōhuà.",en:"Be quiet. (Don't talk.)"},
  ],note:"别 (casual) or 不要 (formal) + verb = 'don't'. Adding 了 means 'stop doing (what you're already doing)': 别吃了 (stop eating) vs 别吃 (don't eat/start eating). Big difference!"},
  {title:"正在…呢 — in progress right now",examples:[
    {cn:"他正在睡觉呢。",py:"Tā zhèngzài shuìjiào ne.",en:"He's sleeping right now."},
    {cn:"我正在做饭呢。",py:"Wǒ zhèngzài zuòfàn ne.",en:"I'm cooking right now."},
  ],note:"正在 + verb + 呢 = 'currently doing right now'. All three parts are optional: 在做饭呢, 正在做饭, 做饭呢 all work. 正在 emphasizes 'right at this moment'."},
],
"H2L11":[
  {title:"比 (bǐ) — comparison",examples:[
    {cn:"他比我大三岁。",py:"Tā bǐ wǒ dà sān suì.",en:"He's 3 years older than me."},
    {cn:"今天比昨天热。",py:"Jīntiān bǐ zuótiān rè.",en:"Today is hotter than yesterday."},
    {cn:"这个比那个便宜一百块。",py:"Zhège bǐ nàge piányi yì bǎi kuài.",en:"This is 100 yuan cheaper than that."},
  ],note:"A + 比 + B + adj (+ amount). Amount goes AFTER the adjective: 大三岁 (3 years older), 贵五十块 (50 yuan more expensive). Negative comparison: A 没有 B + adj: 我没有他高 (I'm not as tall as him). NEVER use 很 with 比."},
  {title:"可能 (kěnéng) — maybe",examples:[
    {cn:"她可能不来了。",py:"Tā kěnéng bù lái le.",en:"She might not come."},
    {cn:"明天可能下雨。",py:"Míngtiān kěnéng xiàyǔ.",en:"It might rain tomorrow."},
    {cn:"不可能！",py:"Bù kěnéng!",en:"Impossible!"},
  ],note:"可能 before the verb = 'maybe/possibly'. Standalone: 可能吧 (maybe so). Negative: 不可能 (impossible). Can be adjective or adverb."},
],
"H2L12":[
  {title:"得 (de) — complement of degree",examples:[
    {cn:"你穿得太少了。",py:"Nǐ chuān de tài shǎo le.",en:"You're wearing too little."},
    {cn:"他跑得很快。",py:"Tā pǎo de hěn kuài.",en:"He runs very fast."},
    {cn:"你说得很好。",py:"Nǐ shuō de hěn hǎo.",en:"You speak very well."},
    {cn:"她唱得不好。",py:"Tā chàng de bù hǎo.",en:"She doesn't sing well."},
  ],note:"Verb + 得 + description evaluates HOW the action is done. 跑得快 (run fast), 说得好 (speak well). Negative: verb + 得 + 不好/不快. This is different from 的 (possessive) and 地 (before verbs). The three de's: 的 (noun), 得 (after verb), 地 (before verb)."},
],
"H2L13":[
  {title:"着 (zhe) — continuous state",examples:[
    {cn:"门开着呢。",py:"Mén kāi zhe ne.",en:"The door is (standing) open."},
    {cn:"她穿着红衣服。",py:"Tā chuān zhe hóng yīfu.",en:"She's wearing red clothes."},
    {cn:"他笑着说。",py:"Tā xiào zhe shuō.",en:"He said with a smile."},
  ],note:"Verb + 着 describes an ongoing STATE (not action): 开着 (is open), 穿着 (is wearing), 坐着 (is sitting). Different from 在 + verb which is ongoing ACTION. 着 = resulting state, 在 = action in progress."},
  {title:"往 (wǎng) — towards / direction",examples:[
    {cn:"往前走。",py:"Wǎng qián zǒu.",en:"Go straight ahead."},
    {cn:"往左转。",py:"Wǎng zuǒ zhuǎn.",en:"Turn left."},
    {cn:"往右看。",py:"Wǎng yòu kàn.",en:"Look right."},
  ],note:"往 + direction + verb. Used for giving directions: 往前 (forward), 往后 (backward), 往左/右 (left/right). Very practical for navigation."},
],
"H2L14":[
  {title:"虽然…但是… — although…but…",examples:[
    {cn:"虽然很累，但是很开心。",py:"Suīrán hěn lèi, dànshì hěn kāixīn.",en:"Although tired, I'm happy."},
    {cn:"虽然贵，但是质量很好。",py:"Suīrán guì, dànshì zhìliàng hěn hǎo.",en:"Although expensive, the quality is good."},
  ],note:"虽然 (although) and 但是 (but) are used TOGETHER in Chinese — unlike English. You can drop 虽然 but usually keep 但是. This double conjunction pattern is standard Chinese grammar."},
  {title:"次 (cì) — counting occurrences",examples:[
    {cn:"我去过两次。",py:"Wǒ qùguo liǎng cì.",en:"I've been twice."},
    {cn:"这个电影我看过三次。",py:"Zhège diànyǐng wǒ kànguo sān cì.",en:"I've seen this movie 3 times."},
  ],note:"Number + 次 counts frequency: 一次 (once), 两次 (twice), 很多次 (many times). Goes after the verb: 去过两次, 看了一次. This is a 'complement of frequency'."},
],
"H2L15":[
  {title:"要…了 — about to happen",examples:[
    {cn:"新年就要到了！",py:"Xīnnián jiù yào dào le!",en:"The New Year is almost here!"},
    {cn:"快要下雨了。",py:"Kuài yào xiàyǔ le.",en:"It's about to rain."},
    {cn:"电影就要开始了。",py:"Diànyǐng jiù yào kāishǐ le.",en:"The movie is about to start."},
  ],note:"快要/就要 + verb + 了 = something is about to happen. 快 emphasizes urgency ('any moment now'), 就 emphasizes certainty ('definitely will'). Both end with 了. Very useful for imminent events."},
  {title:"都…了 — emphasis on 'already'",examples:[
    {cn:"都十二月了！",py:"Dōu shí'èr yuè le!",en:"It's already December!"},
    {cn:"都三年了。",py:"Dōu sān nián le.",en:"It's been 3 years already."},
    {cn:"都十点了，快走吧！",py:"Dōu shí diǎn le, kuài zǒu ba!",en:"It's already 10, let's hurry!"},
  ],note:"都 + amount/time + 了 expresses surprise that something has reached a certain point. Implies 'it's high time' or 'can you believe it'. Often used to urge action: 都很晚了！(It's so late already!)."},
],
}

    {speaker:"B",cn:"没关系。",py:"Méi guānxi.",en:"No worries."},
    {speaker:"A",cn:"谢谢你。",py:"Xièxie nǐ.",en:"Thank you."},
    {speaker:"B",cn:"不客气。",py:"Bú kèqi.",en:"You're welcome."},
  ]},
  {title:"Asking politely",lines:[
    {speaker:"A",cn:"请问，你叫什么名字？",py:"Qǐngwèn, nǐ jiào shénme míngzi?",en:"May I ask, what's your name?"},
    {speaker:"B",cn:"我叫小红。",py:"Wǒ jiào Xiǎo Hóng.",en:"My name is Xiao Hong."},
    {speaker:"A",cn:"他叫什么？",py:"Tā jiào shénme?",en:"What's his name?"},
    {speaker:"B",cn:"他叫大卫。",py:"Tā jiào Dàwèi.",en:"His name is David."},
  ]},
  {title:"Saying goodbye",lines:[
    {speaker:"A",cn:"我要走了，再见！",py:"Wǒ yào zǒu le, zàijiàn!",en:"I have to go, goodbye!"},
    {speaker:"B",cn:"再见！认识你很高兴。",py:"Zàijiàn! Rènshi nǐ hěn gāoxìng.",en:"Goodbye! Nice meeting you."},
  ]},
],
"H1L3":[
  {title:"Family size",lines:[
    {speaker:"A",cn:"你家有几口人？",py:"Nǐ jiā yǒu jǐ kǒu rén?",en:"How many people in your family?"},
    {speaker:"B",cn:"我家有四口人。爸爸、妈妈、哥哥和我。",py:"Wǒ jiā yǒu sì kǒu rén. Bàba, māma, gēge hé wǒ.",en:"Four people. Dad, mom, older brother, and me."},
    {speaker:"A",cn:"你有姐姐吗？",py:"Nǐ yǒu jiějie ma?",en:"Do you have an older sister?"},
    {speaker:"B",cn:"没有，我没有姐姐。你呢？",py:"Méiyǒu, wǒ méiyǒu jiějie. Nǐ ne?",en:"No, I don't. And you?"},
  ]},
  {title:"Siblings",lines:[
    {speaker:"A",cn:"你有弟弟妹妹吗？",py:"Nǐ yǒu dìdi mèimei ma?",en:"Do you have younger brothers or sisters?"},
    {speaker:"B",cn:"我有一个妹妹。",py:"Wǒ yǒu yí gè mèimei.",en:"I have a younger sister."},
    {speaker:"A",cn:"她多大了？",py:"Tā duō dà le?",en:"How old is she?"},
    {speaker:"B",cn:"她今年十岁。",py:"Tā jīnnián shí suì.",en:"She's 10 this year."},
  ]},
  {title:"Pets",lines:[
    {speaker:"A",cn:"你家有猫吗？",py:"Nǐ jiā yǒu māo ma?",en:"Does your family have a cat?"},
    {speaker:"B",cn:"有，我们有两只猫。",py:"Yǒu, wǒmen yǒu liǎng zhī māo.",en:"Yes, we have two cats."},
    {speaker:"A",cn:"我也想有一只猫。",py:"Wǒ yě xiǎng yǒu yì zhī māo.",en:"I also want to have a cat."},
  ]},
],
"H1L4":[
  {title:"What day is it",lines:[
    {speaker:"A",cn:"今天几号？",py:"Jīntiān jǐ hào?",en:"What date is today?"},
    {speaker:"B",cn:"今天十月五号。",py:"Jīntiān shí yuè wǔ hào.",en:"Today is October 5th."},
    {speaker:"A",cn:"今天星期几？",py:"Jīntiān xīngqī jǐ?",en:"What day of the week is it?"},
    {speaker:"B",cn:"今天星期三。",py:"Jīntiān xīngqī sān.",en:"Today is Wednesday."},
  ]},
  {title:"Birthday",lines:[
    {speaker:"A",cn:"你的生日是几月几号？",py:"Nǐ de shēngrì shì jǐ yuè jǐ hào?",en:"When is your birthday?"},
    {speaker:"B",cn:"我的生日是六月十号。",py:"Wǒ de shēngrì shì liù yuè shí hào.",en:"My birthday is June 10th."},
    {speaker:"A",cn:"明天是你的生日吗？",py:"Míngtiān shì nǐ de shēngrì ma?",en:"Is tomorrow your birthday?"},
    {speaker:"B",cn:"不是，是下个星期。",py:"Bú shì, shì xià ge xīngqī.",en:"No, it's next week."},
  ]},
  {title:"Making plans",lines:[
    {speaker:"A",cn:"明天是星期六，你做什么？",py:"Míngtiān shì xīngqī liù, nǐ zuò shénme?",en:"Tomorrow is Saturday, what are you doing?"},
    {speaker:"B",cn:"我想去买东西。",py:"Wǒ xiǎng qù mǎi dōngxi.",en:"I want to go shopping."},
    {speaker:"A",cn:"我也想去！",py:"Wǒ yě xiǎng qù!",en:"I want to go too!"},
  ]},
],
"H1L5":[
  {title:"Jobs",lines:[
    {speaker:"A",cn:"你是做什么工作的？",py:"Nǐ shì zuò shénme gōngzuò de?",en:"What do you do for work?"},
    {speaker:"B",cn:"我是医生，在医院工作。",py:"Wǒ shì yīshēng, zài yīyuàn gōngzuò.",en:"I'm a doctor, I work at a hospital."},
    {speaker:"A",cn:"你喜欢你的工作吗？",py:"Nǐ xǐhuan nǐ de gōngzuò ma?",en:"Do you like your job?"},
    {speaker:"B",cn:"喜欢，但是很忙。",py:"Xǐhuan, dànshì hěn máng.",en:"I like it, but I'm very busy."},
  ]},
  {title:"A friend's job",lines:[
    {speaker:"A",cn:"你的朋友在哪儿工作？",py:"Nǐ de péngyou zài nǎr gōngzuò?",en:"Where does your friend work?"},
    {speaker:"B",cn:"他在一家公司工作。",py:"Tā zài yì jiā gōngsī gōngzuò.",en:"He works at a company."},
    {speaker:"A",cn:"他做什么？",py:"Tā zuò shénme?",en:"What does he do?"},
    {speaker:"B",cn:"他是老师。在学校工作。",py:"Tā shì lǎoshī. Zài xuéxiào gōngzuò.",en:"He's a teacher. Works at a school."},
  ]},
  {title:"New colleague",lines:[
    {speaker:"A",cn:"你好，你是新同事吗？",py:"Nǐ hǎo, nǐ shì xīn tóngshì ma?",en:"Hello, are you the new colleague?"},
    {speaker:"B",cn:"是的，我叫小明。",py:"Shì de, wǒ jiào Xiǎo Míng.",en:"Yes, my name is Xiao Ming."},
    {speaker:"A",cn:"欢迎！你在哪儿工作？",py:"Huānyíng! Nǐ zài nǎr gōngzuò?",en:"Welcome! Where were you working before?"},
    {speaker:"B",cn:"我以前在医院工作。",py:"Wǒ yǐqián zài yīyuàn gōngzuò.",en:"I used to work at a hospital."},
  ]},
,
  {title:"Where do you work",lines:[
    {speaker:"A",cn:"你在哪儿工作？",py:"Nǐ zài nǎr gōngzuò?",en:"Where do you work?"},
    {speaker:"B",cn:"我在银行工作。你呢？",py:"Wǒ zài yínháng gōngzuò. Nǐ ne?",en:"I work at a bank. And you?"},
    {speaker:"A",cn:"我是护士，在医院工作。",py:"Wǒ shì hùshi, zài yīyuàn gōngzuò.",en:"I'm a nurse, I work at a hospital."},
    {speaker:"B",cn:"你的同事多吗？",py:"Nǐ de tóngshì duō ma?",en:"Do you have many colleagues?"},
    {speaker:"A",cn:"很多。我们医院很大。",py:"Hěn duō. Wǒmen yīyuàn hěn dà.",en:"A lot. Our hospital is big."},
  ]},
  {title:"At the supermarket",lines:[
    {speaker:"A",cn:"超市在哪儿？",py:"Chāoshì zài nǎr?",en:"Where is the supermarket?"},
    {speaker:"B",cn:"在饭店旁边。",py:"Zài fàndiàn pángbiān.",en:"Next to the restaurant."},
    {speaker:"A",cn:"商店呢？",py:"Shāngdiàn ne?",en:"What about the shop?"},
    {speaker:"B",cn:"商店在学校前面。",py:"Shāngdiàn zài xuéxiào qiánmiàn.",en:"The shop is in front of the school."},
  ]}],
"H1L6":[
  {title:"Language abilities",lines:[
    {speaker:"A",cn:"你会说汉语吗？",py:"Nǐ huì shuō Hànyǔ ma?",en:"Can you speak Chinese?"},
    {speaker:"B",cn:"我会说一点儿。",py:"Wǒ huì shuō yìdiǎnr.",en:"I can speak a little."},
    {speaker:"A",cn:"你会写汉字吗？",py:"Nǐ huì xiě Hànzì ma?",en:"Can you write Chinese characters?"},
    {speaker:"B",cn:"不会，我只会读。",py:"Bú huì, wǒ zhǐ huì dú.",en:"No, I can only read."},
  ]},
  {title:"Learning together",lines:[
    {speaker:"A",cn:"你在学什么？",py:"Nǐ zài xué shénme?",en:"What are you studying?"},
    {speaker:"B",cn:"我在学汉语。你呢？",py:"Wǒ zài xué Hànyǔ. Nǐ ne?",en:"I'm learning Chinese. You?"},
    {speaker:"A",cn:"我也在学。你会说英语吗？",py:"Wǒ yě zài xué. Nǐ huì shuō Yīngyǔ ma?",en:"Me too. Can you speak English?"},
    {speaker:"B",cn:"会，我的英语很好。",py:"Huì, wǒ de Yīngyǔ hěn hǎo.",en:"Yes, my English is very good."},
  ]},
,
  {title:"What languages",lines:[
    {speaker:"A",cn:"你会说几种语言？",py:"Nǐ huì shuō jǐ zhǒng yǔyán?",en:"How many languages can you speak?"},
    {speaker:"B",cn:"我会说英语和法语。",py:"Wǒ huì shuō Yīngyǔ hé Fǎyǔ.",en:"I can speak English and French."},
    {speaker:"A",cn:"你在学什么？",py:"Nǐ zài xué shénme?",en:"What are you learning?"},
    {speaker:"B",cn:"我在学意大利语。",py:"Wǒ zài xué Yìdàlìyǔ.",en:"I'm learning Italian."},
    {speaker:"A",cn:"你可以教我日语吗？",py:"Nǐ kěyǐ jiāo wǒ Rìyǔ ma?",en:"Can you teach me Japanese?"},
    {speaker:"B",cn:"对不起，我不会日语。",py:"Duìbuqǐ, wǒ bú huì Rìyǔ.",en:"Sorry, I can't speak Japanese."},
  ]}],
"H1L7":[
  {title:"Where do you live",lines:[
    {speaker:"A",cn:"你家在哪里？",py:"Nǐ jiā zài nǎlǐ?",en:"Where is your home?"},
    {speaker:"B",cn:"我家在学校旁边。",py:"Wǒ jiā zài xuéxiào pángbiān.",en:"My home is beside the school."},
    {speaker:"A",cn:"学校在哪儿？",py:"Xuéxiào zài nǎr?",en:"Where is the school?"},
    {speaker:"B",cn:"在医院前面。",py:"Zài yīyuàn qiánmiàn.",en:"In front of the hospital."},
  ]},
  {title:"Looking for the cat",lines:[
    {speaker:"A",cn:"猫在哪儿？",py:"Māo zài nǎr?",en:"Where is the cat?"},
    {speaker:"B",cn:"在桌子下面。",py:"Zài zhuōzi xiàmiàn.",en:"Under the table."},
    {speaker:"A",cn:"我的书在哪里？",py:"Wǒ de shū zài nǎlǐ?",en:"Where is my book?"},
    {speaker:"B",cn:"在椅子上面。",py:"Zài yǐzi shàngmiàn.",en:"On the chair."},
  ]},
  {title:"The neighborhood",lines:[
    {speaker:"A",cn:"你家旁边有什么？",py:"Nǐ jiā pángbiān yǒu shénme?",en:"What's near your home?"},
    {speaker:"B",cn:"有一个商店和一个饭店。",py:"Yǒu yí gè shāngdiàn hé yí gè fàndiàn.",en:"There's a shop and a restaurant."},
    {speaker:"A",cn:"饭店在商店后面吗？",py:"Fàndiàn zài shāngdiàn hòumiàn ma?",en:"Is the restaurant behind the shop?"},
    {speaker:"B",cn:"不是，在商店左边。",py:"Bú shì, zài shāngdiàn zuǒbiān.",en:"No, it's to the left of the shop."},
  ]},
],
"H1L8":[
  {title:"What time",lines:[
    {speaker:"A",cn:"现在几点？",py:"Xiànzài jǐ diǎn?",en:"What time is it now?"},
    {speaker:"B",cn:"现在三点半。",py:"Xiànzài sān diǎn bàn.",en:"It's 3:30."},
    {speaker:"A",cn:"你几点去吃饭？",py:"Nǐ jǐ diǎn qù chīfàn?",en:"What time are you going to eat?"},
    {speaker:"B",cn:"六点。你呢？",py:"Liù diǎn. Nǐ ne?",en:"At 6. And you?"},
  ]},
  {title:"Daily schedule",lines:[
    {speaker:"A",cn:"你早上几点起床？",py:"Nǐ zǎoshang jǐ diǎn qǐchuáng?",en:"What time do you get up in the morning?"},
    {speaker:"B",cn:"七点半。",py:"Qī diǎn bàn.",en:"7:30."},
    {speaker:"A",cn:"几点上课？",py:"Jǐ diǎn shàngkè?",en:"What time does class start?"},
    {speaker:"B",cn:"八点上课，下午三点下课。",py:"Bā diǎn shàngkè, xiàwǔ sān diǎn xiàkè.",en:"Class starts at 8, ends at 3 in the afternoon."},
  ]},
  {title:"Evening plans",lines:[
    {speaker:"A",cn:"晚上你做什么？",py:"Wǎnshang nǐ zuò shénme?",en:"What do you do in the evening?"},
    {speaker:"B",cn:"我看电视。你呢？",py:"Wǒ kàn diànshì. Nǐ ne?",en:"I watch TV. You?"},
    {speaker:"A",cn:"我学习。我十一点睡觉。",py:"Wǒ xuéxí. Wǒ shíyī diǎn shuìjiào.",en:"I study. I sleep at 11."},
  ]},
],
"H1L9":[
  {title:"Ordering food",lines:[
    {speaker:"A",cn:"你想吃什么？",py:"Nǐ xiǎng chī shénme?",en:"What do you want to eat?"},
    {speaker:"B",cn:"我想吃米饭。",py:"Wǒ xiǎng chī mǐfàn.",en:"I want to eat rice."},
    {speaker:"A",cn:"你想喝什么？",py:"Nǐ xiǎng hē shénme?",en:"What do you want to drink?"},
    {speaker:"B",cn:"来一杯咖啡。",py:"Lái yì bēi kāfēi.",en:"A cup of coffee please."},
  ]},
  {title:"At the restaurant",lines:[
    {speaker:"A",cn:"今天的菜很好吃。",py:"Jīntiān de cài hěn hǎochī.",en:"Today's dishes are delicious."},
    {speaker:"B",cn:"你想吃水果吗？",py:"Nǐ xiǎng chī shuǐguǒ ma?",en:"Do you want to eat fruit?"},
    {speaker:"A",cn:"好，我想吃苹果。",py:"Hǎo, wǒ xiǎng chī píngguǒ.",en:"OK, I want an apple."},
    {speaker:"B",cn:"我不想吃水果，来一杯茶吧。",py:"Wǒ bù xiǎng chī shuǐguǒ, lái yì bēi chá ba.",en:"I don't want fruit, I'll have tea."},
  ]},
  {title:"Hotpot invitation",lines:[
    {speaker:"A",cn:"你吃过火锅吗？",py:"Nǐ chīguo huǒguō ma?",en:"Have you ever eaten hotpot?"},
    {speaker:"B",cn:"没有，火锅好吃吗？",py:"Méiyǒu, huǒguō hǎochī ma?",en:"No, is hotpot delicious?"},
    {speaker:"A",cn:"非常好吃！我们去吃火锅吧！",py:"Fēicháng hǎochī! Wǒmen qù chī huǒguō ba!",en:"Extremely delicious! Let's go eat hotpot!"},
    {speaker:"B",cn:"好啊！",py:"Hǎo a!",en:"Great!"},
  ]},
],
"H1L10":[
  {title:"In the library",lines:[
    {speaker:"A",cn:"我能坐这儿吗？",py:"Wǒ néng zuò zhèr ma?",en:"Can I sit here?"},
    {speaker:"B",cn:"能，请坐。",py:"Néng, qǐng zuò.",en:"Yes, please sit."},
    {speaker:"A",cn:"你在看什么书？",py:"Nǐ zài kàn shénme shū?",en:"What book are you reading?"},
    {speaker:"B",cn:"一本很有意思的书。",py:"Yì běn hěn yǒu yìsi de shū.",en:"A very interesting book."},
  ]},
  {title:"Movie night",lines:[
    {speaker:"A",cn:"你想看电影吗？",py:"Nǐ xiǎng kàn diànyǐng ma?",en:"Do you want to watch a movie?"},
    {speaker:"B",cn:"好啊！我们看什么？",py:"Hǎo a! Wǒmen kàn shénme?",en:"Sure! What shall we watch?"},
    {speaker:"A",cn:"我的电脑在那儿。",py:"Wǒ de diànnǎo zài nàr.",en:"My computer is over there."},
    {speaker:"B",cn:"好，我们一起看电视吧。",py:"Hǎo, wǒmen yìqǐ kàn diànshì ba.",en:"OK, let's watch TV together."},
  ]},
,
  {title:"Weekend together",lines:[
    {speaker:"A",cn:"你喜欢听音乐吗？",py:"Nǐ xǐhuan tīng yīnyuè ma?",en:"Do you like listening to music?"},
    {speaker:"B",cn:"喜欢！我们一起去看电影吧。",py:"Xǐhuan! Wǒmen yìqǐ qù kàn diànyǐng ba.",en:"Yes! Let's go watch a movie together."},
    {speaker:"A",cn:"好啊！这个电影有意思吗？",py:"Hǎo a! Zhège diànyǐng yǒu yìsi ma?",en:"Sure! Is this movie interesting?"},
    {speaker:"B",cn:"非常有意思，你一定喜欢。",py:"Fēicháng yǒu yìsi, nǐ yídìng xǐhuan.",en:"Very interesting, you'll definitely like it."},
  ]}],
"H1L11":[
  {title:"Going to work",lines:[
    {speaker:"A",cn:"你怎么去工作？",py:"Nǐ zěnme qù gōngzuò?",en:"How do you get to work?"},
    {speaker:"B",cn:"我坐地铁去。你呢？",py:"Wǒ zuò dìtiě qù. Nǐ ne?",en:"I take the subway. You?"},
    {speaker:"A",cn:"我坐出租车。",py:"Wǒ zuò chūzūchē.",en:"I take a taxi."},
    {speaker:"B",cn:"出租车太贵了！",py:"Chūzūchē tài guì le!",en:"Taxis are too expensive!"},
  ]},
  {title:"Travel plans",lines:[
    {speaker:"A",cn:"你去哪儿？",py:"Nǐ qù nǎr?",en:"Where are you going?"},
    {speaker:"B",cn:"我去机场，坐飞机回家。",py:"Wǒ qù jīchǎng, zuò fēijī huí jiā.",en:"I'm going to the airport, flying home."},
    {speaker:"A",cn:"火车几点到？",py:"Huǒchē jǐ diǎn dào?",en:"What time does the train arrive?"},
    {speaker:"B",cn:"下午三点到。",py:"Xiàwǔ sān diǎn dào.",en:"It arrives at 3 PM."},
  ]},
,
  {title:"Different ways to get there",lines:[
    {speaker:"A",cn:"你怎么去上班？",py:"Nǐ zěnme qù shàngbān?",en:"How do you get to work?"},
    {speaker:"B",cn:"我坐公共汽车。你呢？",py:"Wǒ zuò gōnggòng qìchē. Nǐ ne?",en:"I take the bus. And you?"},
    {speaker:"A",cn:"我骑自行车，有时候走路。",py:"Wǒ qí zìxíngchē, yǒu shíhou zǒulù.",en:"I ride a bike, sometimes walk."},
    {speaker:"B",cn:"你不开车吗？",py:"Nǐ bù kāichē ma?",en:"You don't drive?"},
    {speaker:"A",cn:"不开。车站很近，走路就到了。",py:"Bù kāi. Chēzhàn hěn jìn, zǒulù jiù dào le.",en:"No. The station is close, just walk and you're there."},
  ]}],
"H1L12":[
  {title:"Shopping for clothes",lines:[
    {speaker:"A",cn:"这件衣服多少钱？",py:"Zhè jiàn yīfu duōshao qián?",en:"How much is this piece of clothing?"},
    {speaker:"B",cn:"两百块。",py:"Liǎng bǎi kuài.",en:"200 yuan."},
    {speaker:"A",cn:"太贵了！便宜一点儿吧。",py:"Tài guì le! Piányi yìdiǎnr ba.",en:"Too expensive! A bit cheaper please."},
    {speaker:"B",cn:"好吧，一百五。",py:"Hǎo ba, yì bǎi wǔ.",en:"OK, 150."},
  ]},
  {title:"At the supermarket",lines:[
    {speaker:"A",cn:"你想买什么？",py:"Nǐ xiǎng mǎi shénme?",en:"What do you want to buy?"},
    {speaker:"B",cn:"我想买水果。苹果多少钱？",py:"Wǒ xiǎng mǎi shuǐguǒ. Píngguǒ duōshao qián?",en:"I want fruit. How much are apples?"},
    {speaker:"A",cn:"十块一斤。",py:"Shí kuài yì jīn.",en:"10 yuan per jin."},
    {speaker:"B",cn:"不贵，我买两斤。",py:"Bú guì, wǒ mǎi liǎng jīn.",en:"Not expensive, I'll buy two jin."},
  ]},
,
  {title:"Choosing colors",lines:[
    {speaker:"A",cn:"你喜欢什么颜色？",py:"Nǐ xǐhuan shénme yánsè?",en:"What color do you like?"},
    {speaker:"B",cn:"我喜欢蓝色。你呢？",py:"Wǒ xǐhuan lánsè. Nǐ ne?",en:"I like blue. You?"},
    {speaker:"A",cn:"我喜欢红色和白色。",py:"Wǒ xǐhuan hóngsè hé báisè.",en:"I like red and white."},
    {speaker:"B",cn:"这件黑色的手机很漂亮。",py:"Zhè jiàn hēisè de shǒujī hěn piàoliang.",en:"This black phone is very pretty."},
    {speaker:"A",cn:"太贵了！有便宜的吗？",py:"Tài guì le! Yǒu piányi de ma?",en:"Too expensive! Have a cheaper one?"},
  ]}],
"H1L13":[
  {title:"Cooking together",lines:[
    {speaker:"A",cn:"你喜欢吃中国菜吗？",py:"Nǐ xǐhuan chī Zhōngguó cài ma?",en:"Do you like Chinese food?"},
    {speaker:"B",cn:"非常喜欢！我最喜欢吃火锅。",py:"Fēicháng xǐhuan! Wǒ zuì xǐhuan chī huǒguō.",en:"Very much! I like hotpot the most."},
    {speaker:"A",cn:"你会做饭吗？",py:"Nǐ huì zuòfàn ma?",en:"Can you cook?"},
    {speaker:"B",cn:"我在学做中国菜。",py:"Wǒ zài xué zuò Zhōngguó cài.",en:"I'm learning to cook Chinese food."},
  ]},
  {title:"Food preferences",lines:[
    {speaker:"A",cn:"你喜欢吃什么水果？",py:"Nǐ xǐhuan chī shénme shuǐguǒ?",en:"What fruit do you like?"},
    {speaker:"B",cn:"我喜欢吃苹果。你呢？",py:"Wǒ xǐhuan chī píngguǒ. Nǐ ne?",en:"I like apples. You?"},
    {speaker:"A",cn:"我们都喜欢吃水果。",py:"Wǒmen dōu xǐhuan chī shuǐguǒ.",en:"We all like eating fruit."},
    {speaker:"B",cn:"他也喜欢，他最喜欢吃蛋糕。",py:"Tā yě xǐhuan, tā zuì xǐhuan chī dàngāo.",en:"He likes it too, he likes cake the most."},
  ]},
,
  {title:"Hobbies",lines:[
    {speaker:"A",cn:"你喜欢什么运动？",py:"Nǐ xǐhuan shénme yùndòng?",en:"What sport do you like?"},
    {speaker:"B",cn:"我爱跑步和游泳。你呢？",py:"Wǒ ài pǎobù hé yóuyǒng. Nǐ ne?",en:"I love jogging and swimming. You?"},
    {speaker:"A",cn:"我最喜欢唱歌和跳舞。",py:"Wǒ zuì xǐhuan chànggē hé tiàowǔ.",en:"I like singing and dancing the most."},
    {speaker:"B",cn:"你也喜欢看书吗？",py:"Nǐ yě xǐhuan kànshū ma?",en:"Do you also like reading?"},
    {speaker:"A",cn:"喜欢，我们都喜欢学习。",py:"Xǐhuan, wǒmen dōu xǐhuan xuéxí.",en:"Yes, we all like studying."},
  ]}],
"H1L14":[
  {title:"Movie experience",lines:[
    {speaker:"A",cn:"你看过那个电影吗？",py:"Nǐ kànguo nàge diànyǐng ma?",en:"Have you seen that movie?"},
    {speaker:"B",cn:"看过，非常好看。",py:"Kànguo, fēicháng hǎokàn.",en:"Yes, it's really good."},
    {speaker:"A",cn:"我没看过。",py:"Wǒ méi kànguo.",en:"I haven't seen it."},
    {speaker:"B",cn:"我们一起去看吧！",py:"Wǒmen yìqǐ qù kàn ba!",en:"Let's go watch it together!"},
  ]},
  {title:"Phone call",lines:[
    {speaker:"A",cn:"昨天我给你打电话了。",py:"Zuótiān wǒ gěi nǐ dǎ diànhuà le.",en:"I called you yesterday."},
    {speaker:"B",cn:"对不起，我没接。你有什么事？",py:"Duìbuqǐ, wǒ méi jiē. Nǐ yǒu shénme shì?",en:"Sorry, I didn't answer. What's up?"},
    {speaker:"A",cn:"我想问你去过中国吗？",py:"Wǒ xiǎng wèn nǐ qùguo Zhōngguó ma?",en:"I wanted to ask, have you been to China?"},
    {speaker:"B",cn:"去过两次，我很高兴。",py:"Qùguo liǎng cì, wǒ hěn gāoxìng.",en:"Twice, I was very happy."},
  ]},
],
"H1L15":[
  {title:"Weather chat",lines:[
    {speaker:"A",cn:"今天天气怎么样？",py:"Jīntiān tiānqì zěnmeyàng?",en:"How's the weather today?"},
    {speaker:"B",cn:"今天很热。",py:"Jīntiān hěn rè.",en:"It's very hot today."},
    {speaker:"A",cn:"明天呢？",py:"Míngtiān ne?",en:"What about tomorrow?"},
    {speaker:"B",cn:"明天可能要下雨。",py:"Míngtiān kěnéng yào xiàyǔ.",en:"It might rain tomorrow."},
  ]},
  {title:"Rainy day",lines:[
    {speaker:"A",cn:"下雨了！我们回家吧。",py:"Xiàyǔ le! Wǒmen huí jiā ba.",en:"It's raining! Let's go home."},
    {speaker:"B",cn:"好，快一点儿走。",py:"Hǎo, kuài yìdiǎnr zǒu.",en:"OK, walk a bit faster."},
    {speaker:"A",cn:"昨天太冷了。",py:"Zuótiān tài lěng le.",en:"Yesterday was too cold."},
    {speaker:"B",cn:"是啊，今天的天气好多了。",py:"Shì a, jīntiān de tiānqì hǎo duō le.",en:"Yes, today's weather is much better."},
  ]},
,
  {title:"Talking about seasons",lines:[
    {speaker:"A",cn:"今天下雪了！",py:"Jīntiān xià xuě le!",en:"It's snowing today!"},
    {speaker:"B",cn:"是啊，外面也刮风。",py:"Shì a, wàimiàn yě guāfēng.",en:"Yes, and it's windy outside."},
    {speaker:"A",cn:"冬天太冷了。",py:"Dōngtiān tài lěng le.",en:"Winter is too cold."},
    {speaker:"B",cn:"我喜欢春天，很暖和。",py:"Wǒ xǐhuan chūntiān, hěn nuǎnhuo.",en:"I like spring, it's warm."},
    {speaker:"A",cn:"秋天也很凉快。",py:"Qiūtiān yě hěn liángkuai.",en:"Autumn is also nice and cool."},
  ]}],
"H2L1":[
  {title:"Planning a trip",lines:[
    {speaker:"A",cn:"我要去北京旅游，你觉得什么时候去最好？",py:"Wǒ yào qù Běijīng lǚyóu, nǐ juéde shénme shíhou qù zuì hǎo?",en:"I want to travel to Beijing, when do you think is best?"},
    {speaker:"B",cn:"九月去北京旅游最好。",py:"Jiǔ yuè qù Běijīng lǚyóu zuì hǎo.",en:"September is the best time to visit Beijing."},
    {speaker:"A",cn:"为什么？",py:"Wèi shénme?",en:"Why?"},
    {speaker:"B",cn:"因为九月的北京天气不冷也不热。",py:"Yīnwèi jiǔ yuè de Běijīng tiānqì bù lěng yě bú rè.",en:"Because Beijing in September is neither cold nor hot."},
  ]},
  {title:"Sports afternoon",lines:[
    {speaker:"A",cn:"你喜欢什么运动？",py:"Nǐ xǐhuan shénme yùndòng?",en:"What sport do you like?"},
    {speaker:"B",cn:"我最喜欢踢足球。",py:"Wǒ zuì xǐhuan tī zúqiú.",en:"I like playing football the most."},
    {speaker:"A",cn:"下午我们一起去踢足球吧。",py:"Xiàwǔ wǒmen yìqǐ qù tī zúqiú ba.",en:"Let's go play football this afternoon."},
    {speaker:"B",cn:"好啊！",py:"Hǎo a!",en:"Great!"},
  ]},
  {title:"Buying furniture",lines:[
    {speaker:"A",cn:"我们要不要买几个新的椅子？",py:"Wǒmen yào bu yào mǎi jǐ gè xīn de yǐzi?",en:"Should we buy some new chairs?"},
    {speaker:"B",cn:"好啊。什么时候去买？",py:"Hǎo a. Shénme shíhou qù mǎi?",en:"Sure. When shall we go buy them?"},
    {speaker:"A",cn:"明天下午怎么样？",py:"Míngtiān xiàwǔ zěnmeyàng?",en:"How about tomorrow afternoon?"},
    {speaker:"B",cn:"好，三点多去吧。",py:"Hǎo, sān diǎn duō qù ba.",en:"OK, let's go around 3."},
  ]},
  {title:"The cat",lines:[
    {speaker:"A",cn:"桌子下面有个猫。",py:"Zhuōzi xiàmiàn yǒu gè māo.",en:"There's a cat under the table."},
    {speaker:"B",cn:"那是我的猫，它叫花花。",py:"Nà shì wǒ de māo, tā jiào Huāhua.",en:"That's my cat, it's called Huahua."},
    {speaker:"A",cn:"它很漂亮。",py:"Tā hěn piàoliang.",en:"It's beautiful."},
    {speaker:"B",cn:"我觉得它的眼睛最漂亮。",py:"Wǒ juéde tā de yǎnjing zuì piàoliang.",en:"I think its eyes are the most beautiful."},
  ]},
],
"H2L2":[
  {title:"Morning routine",lines:[
    {speaker:"A",cn:"你很少生病，是不是喜欢运动？",py:"Nǐ hěn shǎo shēngbìng, shì bu shì xǐhuan yùndòng?",en:"You seldom get sick, you like sports right?"},
    {speaker:"B",cn:"是啊，我每天早上都要出去跑步。",py:"Shì a, wǒ měi tiān zǎoshang dōu yào chūqù pǎobù.",en:"Yes, I go jogging every morning."},
    {speaker:"A",cn:"你每天几点起床？",py:"Nǐ měi tiān jǐ diǎn qǐchuáng?",en:"What time do you get up?"},
    {speaker:"B",cn:"我每天六点起床。",py:"Wǒ měi tiān liù diǎn qǐchuáng.",en:"I get up at 6 every day."},
  ]},
  {title:"At the hospital",lines:[
    {speaker:"A",cn:"吃药了吗？现在身体怎么样？",py:"Chī yào le ma? Xiànzài shēntǐ zěnmeyàng?",en:"Did you take medicine? How do you feel?"},
    {speaker:"B",cn:"吃了。现在好多了。",py:"Chī le. Xiànzài hǎo duō le.",en:"Yes. Much better now."},
    {speaker:"A",cn:"他什么时候能出院？",py:"Tā shénme shíhou néng chūyuàn?",en:"When can he leave the hospital?"},
    {speaker:"B",cn:"医生说下个星期。",py:"Yīshēng shuō xià ge xīngqī.",en:"The doctor said next week."},
  ]},
  {title:"Busy teacher",lines:[
    {speaker:"A",cn:"张老师星期六也不休息啊？",py:"Zhāng lǎoshī xīngqī liù yě bù xiūxi a?",en:"Mr. Zhang doesn't rest on Saturday either?"},
    {speaker:"B",cn:"他这几天很忙，没有时间休息。",py:"Tā zhè jǐ tiān hěn máng, méiyǒu shíjiān xiūxi.",en:"He's been busy lately, no time to rest."},
    {speaker:"A",cn:"他每天回来都很累吧？",py:"Tā měi tiān huílái dōu hěn lèi ba?",en:"He must be exhausted when he comes home?"},
    {speaker:"B",cn:"是啊，他要多休息。",py:"Shì a, tā yào duō xiūxi.",en:"Yes, he should rest more."},
  ]},
  {title:"How tall",lines:[
    {speaker:"A",cn:"大卫今年多大？",py:"Dàwèi jīnnián duō dà?",en:"How old is David this year?"},
    {speaker:"B",cn:"他今年二十五岁。",py:"Tā jīnnián èrshíwǔ suì.",en:"He's 25 this year."},
    {speaker:"A",cn:"他多高？",py:"Tā duō gāo?",en:"How tall is he?"},
    {speaker:"B",cn:"一米八。",py:"Yì mǐ bā.",en:"1.8 meters."},
  ]},
],
"H2L3":[
  {title:"The watch",lines:[
    {speaker:"A",cn:"这块手表是你的吗？",py:"Zhè kuài shǒubiǎo shì nǐ de ma?",en:"Is this watch yours?"},
    {speaker:"B",cn:"不是我的。是我爸爸的。",py:"Bú shì wǒ de. Shì wǒ bàba de.",en:"Not mine. It's my dad's."},
    {speaker:"A",cn:"多少钱买的？",py:"Duōshao qián mǎi de?",en:"How much was it?"},
    {speaker:"B",cn:"三千多块。",py:"Sānqiān duō kuài.",en:"More than 3,000 yuan."},
  ]},
  {title:"Morning delivery",lines:[
    {speaker:"A",cn:"这是今天早上的报纸吗？",py:"Zhè shì jīntiān zǎoshang de bàozhǐ ma?",en:"Is this today's morning paper?"},
    {speaker:"B",cn:"不是，是昨天的。",py:"Bú shì, shì zuótiān de.",en:"No, it's yesterday's."},
    {speaker:"A",cn:"你听，是不是送报纸的来了？",py:"Nǐ tīng, shì bu shì sòng bàozhǐ de lái le?",en:"Listen, is that the newspaper delivery?"},
    {speaker:"B",cn:"我看一下。不是，是送牛奶的。",py:"Wǒ kàn yíxià. Bú shì, shì sòng niúnǎi de.",en:"Let me look. No, it's the milk delivery."},
  ]},
  {title:"Which one is yours",lines:[
    {speaker:"A",cn:"这个房间真漂亮。",py:"Zhège fángjiān zhēn piàoliang.",en:"This room is really beautiful."},
    {speaker:"B",cn:"谢谢。你喜欢什么颜色？",py:"Xièxie. Nǐ xǐhuan shénme yánsè?",en:"Thanks. What color do you like?"},
    {speaker:"A",cn:"我喜欢红色的。",py:"Wǒ xǐhuan hóngsè de.",en:"I like the red one."},
    {speaker:"B",cn:"左边那个红色的是我丈夫的。",py:"Zuǒbiān nàge hóngsè de shì wǒ zhàngfu de.",en:"The red one on the left is my husband's."},
  ]},
],
"H2L4":[
  {title:"Birthday party",lines:[
    {speaker:"A",cn:"生日快乐！这是给你的礼物。",py:"Shēngrì kuàilè! Zhè shì gěi nǐ de lǐwù.",en:"Happy birthday! This is a gift for you."},
    {speaker:"B",cn:"谢谢！你太好了。",py:"Xièxie! Nǐ tài hǎo le.",en:"Thank you! You're too kind."},
    {speaker:"A",cn:"晚上我们去吃饭吧。",py:"Wǎnshang wǒmen qù chīfàn ba.",en:"Let's go eat dinner tonight."},
    {speaker:"B",cn:"好啊！去哪儿？",py:"Hǎo a! Qù nǎr?",en:"Sure! Where?"},
  ]},
  {title:"Job recommendation",lines:[
    {speaker:"A",cn:"这个工作是他帮我介绍的。",py:"Zhège gōngzuò shì tā bāng wǒ jièshào de.",en:"He recommended me for this job."},
    {speaker:"B",cn:"你是什么时候开始工作的？",py:"Nǐ shì shénme shíhou kāishǐ gōngzuò de?",en:"When did you start working?"},
    {speaker:"A",cn:"我已经工作两年了。",py:"Wǒ yǐjīng gōngzuò liǎng nián le.",en:"I've been working for two years already."},
    {speaker:"B",cn:"时间过得真快。",py:"Shíjiān guò de zhēn kuài.",en:"Time passes really fast."},
  ]},
,
  {title:"Catching up",lines:[
    {speaker:"A",cn:"最近你在忙什么事情？",py:"Zuìjìn nǐ zài máng shénme shìqing?",en:"What have you been busy with lately?"},
    {speaker:"B",cn:"工作非常忙。",py:"Gōngzuò fēicháng máng.",en:"Work is extremely busy."},
    {speaker:"A",cn:"你已经在那儿工作多长时间了？",py:"Nǐ yǐjīng zài nàr gōngzuò duō cháng shíjiān le?",en:"How long have you been working there?"},
    {speaker:"B",cn:"已经三年了。时间过得真快。",py:"Yǐjīng sān nián le. Shíjiān guò de zhēn kuài.",en:"Already 3 years. Time flies."},
  ]}],
"H2L5":[
  {title:"Shopping decision",lines:[
    {speaker:"A",cn:"你觉得这件怎么样？",py:"Nǐ juéde zhè jiàn zěnmeyàng?",en:"What do you think of this one?"},
    {speaker:"B",cn:"不错，但是有点儿贵。",py:"Búcuò, dànshì yǒudiǎnr guì.",en:"Not bad, but a bit expensive."},
    {speaker:"A",cn:"那边还有便宜的。",py:"Nàbiān hái yǒu piányi de.",en:"There are cheaper ones over there."},
    {speaker:"B",cn:"就买这件吧。",py:"Jiù mǎi zhè jiàn ba.",en:"Let's just buy this one."},
  ]},
  {title:"After the exam",lines:[
    {speaker:"A",cn:"考试准备好了吗？",py:"Kǎoshì zhǔnbèi hǎo le ma?",en:"Are you ready for the exam?"},
    {speaker:"B",cn:"准备好了。考试以后去喝咖啡吧。",py:"Zhǔnbèi hǎo le. Kǎoshì yǐhòu qù hē kāfēi ba.",en:"Ready. Let's get coffee after the exam."},
    {speaker:"A",cn:"好，外面那家不错。",py:"Hǎo, wàimiàn nà jiā búcuò.",en:"OK, that place outside is good."},
    {speaker:"B",cn:"对，我们去那儿吧。",py:"Duì, wǒmen qù nàr ba.",en:"Right, let's go there."},
  ]},
,
  {title:"Buying clothes",lines:[
    {speaker:"A",cn:"这件衣服怎么样？",py:"Zhè jiàn yīfu zěnmeyàng?",en:"How about this piece of clothing?"},
    {speaker:"B",cn:"不错，但是有点儿贵。",py:"Búcuò, dànshì yǒudiǎnr guì.",en:"Not bad, but a bit expensive."},
    {speaker:"A",cn:"你想买裤子还是鞋？",py:"Nǐ xiǎng mǎi kùzi háishi xié?",en:"Do you want pants or shoes?"},
    {speaker:"B",cn:"我想买一双鞋。就买这双吧。",py:"Wǒ xiǎng mǎi yì shuāng xié. Jiù mǎi zhè shuāng ba.",en:"I want shoes. Let's just buy this pair."},
  ]}],
"H2L6":[
  {title:"In the restaurant",lines:[
    {speaker:"A",cn:"今天的羊肉很好吃，你怎么不吃了？",py:"Jīntiān de yángròu hěn hǎochī, nǐ zěnme bù chī le?",en:"Today's mutton is delicious, why did you stop eating?"},
    {speaker:"B",cn:"这个星期天天都吃羊肉，不想吃了。",py:"Zhège xīngqī tiāntiān dōu chī yángròu, bù xiǎng chī le.",en:"I've eaten mutton every day this week, I don't want more."},
    {speaker:"A",cn:"那你还想吃什么？",py:"Nà nǐ hái xiǎng chī shénme?",en:"Then what else do you want to eat?"},
    {speaker:"B",cn:"来一点儿面条吧。",py:"Lái yìdiǎnr miàntiáo ba.",en:"Some noodles please."},
  ]},
  {title:"Sports and health",lines:[
    {speaker:"A",cn:"你姐姐喜欢什么运动？",py:"Nǐ jiějie xǐhuan shénme yùndòng?",en:"What sports does your sister like?"},
    {speaker:"B",cn:"她喜欢打篮球和游泳。",py:"Tā xǐhuan dǎ lánqiú hé yóuyǒng.",en:"She likes basketball and swimming."},
    {speaker:"A",cn:"因为她经常运动，所以身体很好。",py:"Yīnwèi tā jīngcháng yùndòng, suǒyǐ shēntǐ hěn hǎo.",en:"Because she exercises often, she's very healthy."},
    {speaker:"B",cn:"是啊，我也要多运动。",py:"Shì a, wǒ yě yào duō yùndòng.",en:"Yes, I should exercise more too."},
  ]},
  {title:"Spotted the bike",lines:[
    {speaker:"A",cn:"你知道小王今天来了吗？",py:"Nǐ zhīdào Xiǎo Wáng jīntiān lái le ma?",en:"Do you know Xiao Wang came today?"},
    {speaker:"B",cn:"你怎么知道？",py:"Nǐ zěnme zhīdào?",en:"How do you know?"},
    {speaker:"A",cn:"我在门外看见他的自行车了。",py:"Wǒ zài mén wài kànjiàn tā de zìxíngchē le.",en:"I saw his bike outside the door."},
  ]},
],
"H2L7":[
  {title:"Commute",lines:[
    {speaker:"A",cn:"你家离公司远吗？",py:"Nǐ jiā lí gōngsī yuǎn ma?",en:"Do you live far from your company?"},
    {speaker:"B",cn:"不远，坐公共汽车半个小时。",py:"Bù yuǎn, zuò gōnggòng qìchē bàn ge xiǎoshí.",en:"Not far, half an hour by bus."},
    {speaker:"A",cn:"走路呢？",py:"Zǒulù ne?",en:"What about walking?"},
    {speaker:"B",cn:"走路太慢了，要一个小时。",py:"Zǒulù tài màn le, yào yí ge xiǎoshí.",en:"Walking is too slow, takes an hour."},
  ]},
  {title:"Running late",lines:[
    {speaker:"A",cn:"快点儿走，要迟到了！",py:"Kuài diǎnr zǒu, yào chídào le!",en:"Walk faster, we'll be late!"},
    {speaker:"B",cn:"我们坐车去吧，走路太慢了。",py:"Wǒmen zuò chē qù ba, zǒulù tài màn le.",en:"Let's drive, walking is too slow."},
    {speaker:"A",cn:"从这儿到学校要多长时间？",py:"Cóng zhèr dào xuéxiào yào duō cháng shíjiān?",en:"How long from here to school?"},
    {speaker:"B",cn:"坐车就十分钟。",py:"Zuò chē jiù shí fēnzhōng.",en:"Just 10 minutes by car."},
  ]},
],
"H2L8":[
  {title:"Making a decision",lines:[
    {speaker:"A",cn:"你想买白色的还是黑色的？",py:"Nǐ xiǎng mǎi báisè de háishi hēisè de?",en:"Do you want the white or black one?"},
    {speaker:"B",cn:"让我想想再告诉你。",py:"Ràng wǒ xiǎngxiang zài gàosu nǐ.",en:"Let me think about it and I'll tell you."},
    {speaker:"A",cn:"好，不着急。",py:"Hǎo, bù zhāojí.",en:"OK, no rush."},
    {speaker:"B",cn:"我要白色的。",py:"Wǒ yào báisè de.",en:"I'll take the white one."},
  ]},
  {title:"Asking for info",lines:[
    {speaker:"A",cn:"你能告诉我他的电话号码吗？",py:"Nǐ néng gàosu wǒ tā de diànhuà hàomǎ ma?",en:"Can you tell me his phone number?"},
    {speaker:"B",cn:"等一下，我找一找。",py:"Děng yíxià, wǒ zhǎo yi zhǎo.",en:"Wait a moment, let me look."},
    {speaker:"A",cn:"谢谢！",py:"Xièxie!",en:"Thanks!"},
    {speaker:"B",cn:"找到了，我再说一遍。",py:"Zhǎodào le, wǒ zài shuō yí biàn.",en:"Found it, I'll say it once more."},
  ]},

// ═══ UTILS ═══
const stripTones=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ü/g,'v').replace(/Ü/g,'V');
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b};
const $=id=>document.getElementById(id);
const app=document.getElementById('app');
let S={screen:'home',lessonId:null,mode:null,cumulative:false};

function render(){
  window.scrollTo(0,0);
  const m={home:renderHome,lessons:renderLessons,lesson:renderLesson,flash:renderFlash,quiz:renderQuiz,type:renderType,match:renderMatch,sent:renderSent,notes:renderNotes,grammar:renderGrammar,dialogue:renderDialogue,ai:renderAI};
  (m[S.screen]||renderHome)();
}

// ═══ GET VOCAB FOR CURRENT CONTEXT ═══
function getV(){
  if(S.lessonId==='all'){
    const all=LESSONS.flatMap(l=>l.vocab);
    return dedup([...all,...NOTES_VOCAB.map(v=>({h:v.h,p:v.p,e:v.e}))]);
  }
  if(S.lessonId==='notes')return NOTES_VOCAB.map(v=>({h:v.h,p:v.p,e:v.e}));
  const L=LESSONS.find(l=>l.id===S.lessonId);
  if(!L)return[];
  if(!S.cumulative)return L.vocab;
  // Cumulative: this lesson + all prior
  const idx=LESSONS.indexOf(L);
  const all=[];
  for(let i=0;i<=idx;i++)LESSONS[i].vocab.forEach(v=>{if(!all.find(x=>x.h===v.h))all.push(v)});
  return all;
}
function dedup(arr){const s=new Set();return arr.filter(v=>{if(s.has(v.h))return false;s.add(v.h);return true})}
function getS(){
  if(S.lessonId==='all'){
    let all=LESSONS.flatMap(l=>l.sentences);
    for(const k in EXTRA_SENTENCES)all=all.concat(EXTRA_SENTENCES[k].map(s=>({p:s.py,e:s.en,w:s.w})));
    return dedupS(all);
  }
  const L=LESSONS.find(l=>l.id===S.lessonId);
  if(!L)return[];
  let pool=[...L.sentences];
  const ex=EXTRA_SENTENCES[L.id];
  if(ex)pool=pool.concat(ex.map(s=>({p:s.py,e:s.en,w:s.w})));
  // Dialogue sentences excluded from rearrange (char-split issues)
  return dedupS(pool);
}
function dedupS(arr){const s=new Set();return arr.filter(x=>{const k=x.p||x.py;if(s.has(k))return false;s.add(k);return true})}
function goBack(){
  if(S.lessonId==='all'||S.lessonId==='notes'){S.screen='home';S.lessonId=null;}
  else{S.screen='lesson';}
  render();
}

  const L=LESSONS.find(l=>l.id===S.lessonId);
  if(!L)return;
  const notes=GRAMMAR_NOTES[L.id]||[];
  const clr=L.level==='HSK1'?'var(--hsk1)':'var(--hsk2)';
  app.innerHTML=`
  <div class="header"><button class="back" onclick="S.screen='lesson';render()">←</button><div><div class="t">Grammar & Notes</div><div class="s">${L.level} · Lesson ${L.num}</div></div></div>
  <div style="padding:20px" class="fi">
    ${notes.length?notes.map((n,i)=>`
      <div style="margin-bottom:24px;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:14px;border-left:3px solid ${clr}">
        <div style="font-size:15px;font-weight:700;color:${clr};margin-bottom:12px">${n.title}</div>
        <div style="margin-bottom:12px">
          ${(n.examples||[]).map(ex=>`
            <div style="padding:8px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px">
              <div style="font-size:16px;font-weight:600;color:var(--hanzi)">${ex.cn}</div>
              <div style="font-size:13px;color:var(--pinyin);margin-top:2px">${ex.py}</div>
              <div style="font-size:12px;color:var(--dim);margin-top:2px">${ex.en}</div>
            </div>
          `).join('')}
        </div>
        <div style="font-size:13px;color:var(--text);line-height:1.7;opacity:.85">${n.note}</div>
      </div>
    `).join(''):`<p style="color:var(--muted);text-align:center;padding:40px 0">Grammar notes coming soon for this lesson.</p>`}
  </div>`;
}

// ═══ DIALOGUE SCREEN ═══
function renderDialogue(){
  const L=LESSONS.find(l=>l.id===S.lessonId);
  if(!L)return;
  const dlgs=DIALOGUES[L.id]||[];
  const clr=L.level==='HSK1'?'var(--hsk1)':'var(--hsk2)';

  // Build unified dialogue list (from DIALOGUES data or from sentence pairs)
  let allDialogues=[];
  if(dlgs.length){
    allDialogues=dlgs;
  } else if(L.sentences.length>=2){
    const lines=[];
    for(let i=0;i<L.sentences.length;i++){
      lines.push({speaker:i%2===0?'A':'B', py:L.sentences[i].p||L.sentences[i].py, en:L.sentences[i].e||L.sentences[i].en, cn:''});
    }
    allDialogues=[{title:L.titleEn, lines}];
  }

  if(!allDialogues.length){
    app.innerHTML=`<div class="header"><button class="back" onclick="S.screen='lesson';render()">←</button><div><div class="t">Dialogue Practice</div><div class="s">${L.level} · Lesson ${L.num}</div></div></div><p style="color:var(--muted);text-align:center;padding:40px">No dialogues for this lesson yet.</p>`;
    return;
  }

  // State: which dialogue, which lines are revealed
  let dIdx=0;
  let revealed=new Set(); // set of line indices that have been revealed

  function d(){
    const dlg=allDialogues[dIdx];
    const total=dlg.lines.length;
    const allRevealed=revealed.size>=total;

    app.innerHTML=`
    <div class="header"><button class="back" onclick="S.screen='lesson';render()">←</button><div><div class="t">Dialogue Practice</div><div class="s">${L.level} · Lesson ${L.num}${allDialogues.length>1?' · Dialogue '+(dIdx+1)+'/'+allDialogues.length:''}</div></div></div>
    <div style="padding:20px" class="fi">
      <div style="padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px">
        <div style="font-size:14px;font-weight:700;color:${clr};margin-bottom:6px">${dlg.title}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Read the English, then tap each line to reveal the Chinese translation. Test yourself before peeking!</div>

        ${dlg.lines.map((l,i)=>{
          const isRevealed=revealed.has(i);
          const hasCn=l.cn&&l.cn.length>0;
          return `
          <div style="margin-bottom:14px">
            <div style="display:flex;gap:10px;align-items:flex-start">
              <div style="width:28px;height:28px;border-radius:50%;background:${l.speaker==='A'?clr+'22':'var(--accent)22'};color:${l.speaker==='A'?clr:'var(--accent)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${l.speaker}</div>
              <div style="flex:1">
                <div style="font-size:14px;color:var(--text);font-weight:500;margin-bottom:6px">${l.en}</div>
                ${isRevealed?`
                  <div style="padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
                    ${hasCn?`<div style="font-size:16px;font-weight:600;color:var(--hanzi);margin-bottom:3px">${l.cn}</div>`:''}
                    <div style="font-size:14px;color:var(--pinyin);font-weight:500">${l.py}</div>
                  </div>
                `:`
                  <button onclick="window._dlgReveal(${i})" style="width:100%;padding:10px 12px;background:var(--bg);border-radius:8px;border:1px dashed var(--border);color:var(--muted);font-size:13px;font-family:inherit;text-align:left;cursor:pointer">
                    👆 Tap to reveal Chinese
                  </button>
                `}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;gap:8px">
        ${allRevealed?`<button class="bp" style="flex:1" onclick="window._dlgReset()">🔄 Hide All & Retry</button>`:`<button class="bp" style="flex:1" onclick="window._dlgRevealAll()">👁 Reveal All</button>`}
        ${allDialogues.length>1?`<button class="bp" style="flex:1;background:${clr}" onclick="window._dlgNext()">${dIdx<allDialogues.length-1?'Next Dialogue →':'First Dialogue ↺'}</button>`:''}
      </div>
      ${allRevealed?`<button class="bp" style="width:100%;margin-top:8px;background:var(--ok);color:#fff" onclick="S.screen='sent';render()">Practice these sentences →</button>`:''}
    </div>`;
  }

  window._dlgReveal=i=>{revealed.add(i);d()};
  window._dlgRevealAll=()=>{const dlg=allDialogues[dIdx];for(let i=0;i<dlg.lines.length;i++)revealed.add(i);d()};
  window._dlgReset=()=>{revealed=new Set();d()};
  window._dlgNext=()=>{dIdx=(dIdx+1)%allDialogues.length;revealed=new Set();d()};

  d();
}
// ═══ RANDOM PRACTICE (offline — draws from expanded bank) ═══
function renderAI(){
  const L=LESSONS.find(l=>l.id===S.lessonId);
  if(!L)return;
  const clr=L.level==='HSK1'?'var(--hsk1)':'var(--hsk2)';

  // Gather ALL available sentences: base + extra for this lesson, plus cumulative from prior
  const idx=LESSONS.indexOf(L);
  let pool=[];
  for(let i=0;i<=idx;i++){
    const lid=LESSONS[i].id;
    pool=pool.concat(LESSONS[i].sentences);
    if(EXTRA_SENTENCES[lid]) pool=pool.concat(EXTRA_SENTENCES[lid]);
  }
  // Deduplicate by pinyin
  const seen=new Set();
  pool=pool.filter(s=>{if(seen.has(s.p||s.py))return false;seen.add(s.p||s.py);return true});
  // Normalize: some have .p, some .py
  pool=pool.map(s=>({py:s.py||s.p, en:s.en||s.e, w:s.w}));

  let batch=[], mode='menu', placed=[], avail=[], sIdx=0, res=null, sc=0, batchSize=8, prevRevealed=new Set();

  function genBatch(){
    // Pick batchSize random sentences, prioritizing current lesson
    const thisLesson=[...L.sentences.map(s=>({py:s.p||s.py,en:s.en||s.e,w:s.w}))];
    const extra=(EXTRA_SENTENCES[L.id]||[]).map(s=>({py:s.py,en:s.en,w:s.w}));
    const combined=shuffle([...thisLesson,...extra]);
    const fromPrev=shuffle(pool.filter(s=>!combined.find(c=>c.py===s.py)));
    // Take 5 from current + 3 from previous (or as many as available)
    batch=shuffle([...combined.slice(0,Math.min(6,combined.length)),...fromPrev.slice(0,2)]).slice(0,batchSize);
    if(batch.length===0) batch=shuffle(pool).slice(0,batchSize);
  }

  function initRound(){
    const s=batch[sIdx];
    if(!s||!s.w)return;
    avail=shuffle(s.w.map((w,i)=>({id:i,t:w})));
    placed=[];res=null;
  }

  function d(){
    if(mode==='menu'){
      app.innerHTML=`
      <div class="header"><button class="back" onclick="S.screen='lesson';render()">←</button><div><div class="t">Random Practice</div><div class="s">${L.level} · Lesson ${L.num}</div></div></div>
      <div style="padding:20px" class="fi">
        <div style="padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px">
          <div style="font-size:13px;color:var(--dim);line-height:1.6">
            Practice with a <strong style="color:var(--text)">random mix</strong> of sentences from this lesson and all previous ones. 
            Each round is different — the sentences are shuffled from a bank of <strong style="color:var(--text)">${pool.length}</strong> sentences.
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="bp" style="width:100%;padding:14px;font-size:15px" onclick="window._rpStart('rearrange')">🧩 Rearrange Words (${batch.length} sentences)</button>
          <button class="bp" style="width:100%;padding:14px;font-size:15px;background:${clr}" onclick="window._rpStart('translate')">✍️ Translate to Pinyin (${batch.length} sentences)</button>
          <button class="bp" style="width:100%;padding:14px;font-size:15px;background:var(--ok);color:#fff" onclick="window._rpStart('mixed')">🎲 Mixed Practice (${batch.length} sentences)</button>
        </div>
        <div style="margin-top:20px">
          <div class="mono" style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.1em">This round's sentences (tap to reveal English)</div>
          ${batch.map((s,i)=>`
            <div style="padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="window._rpReveal(${i})">
              <div style="font-size:13px;color:var(--pinyin)">${s.py}</div>
              ${prevRevealed.has(i)?`<div style="font-size:12px;color:var(--dim);margin-top:2px">${s.en}</div>`:`<div style="font-size:11px;color:var(--muted);margin-top:2px">👆 tap to reveal</div>`}
            </div>
          `).join('')}
        </div>
      </div>`;
      return;
    }

    // Practice modes
    if(sIdx>=batch.length){
      app.innerHTML=`
      <div class="header"><button class="back" onclick="window._rpMenu()">←</button><div><div class="t">Round Complete</div></div></div>
      <div style="padding:40px;text-align:center" class="fi">
        <div class="mono" style="font-size:56px;font-weight:900;color:var(--accent)">${sc}/${batch.length}</div>
        <div style="font-size:15px;color:var(--dim);margin-top:8px">${sc>=batch.length*.8?'Excellent!':sc>=batch.length*.5?'Good progress!':'Keep practicing!'}</div>
        <div style="display:flex;gap:8px;margin-top:20px;justify-content:center">
          <button class="bp" onclick="window._rpMenu()">New Round</button>
          <button class="bp" style="background:${clr}" onclick="S.screen='lesson';render()">Back to Lesson</button>
        </div>
      </div>`;
      return;
    }

    const s=batch[sIdx];
    const isRearrange = mode==='rearrange' || (mode==='mixed' && sIdx%2===0);

    if(isRearrange){
      app.innerHTML=`
      <div class="header"><button class="back" onclick="window._rpMenu()">←</button><div><div class="t">Rearrange</div><div class="s">${sIdx+1}/${batch.length} · Score: ${sc}</div></div></div>
      <div class="pbar"><div class="fill" style="width:${((sIdx+1)/batch.length*100)}%"></div></div>
      <div style="padding:20px" class="fi">
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:16px;font-weight:500">${s.en}</div>
          <div style="font-size:13px;color:var(--pinyin);margin-top:4px">${s.py}</div>
        </div>
        <div class="sarea" style="border-color:${res===null?'var(--muted)':res?'var(--ok)':'var(--err)'}">
          ${placed.length===0?'<span style="color:var(--muted);font-size:12px;margin:auto">Tap words to build sentence</span>':''}
          ${placed.map(w=>`<button class="chip" style="background:rgba(240,192,64,.15);border-color:rgba(240,192,64,.35);color:var(--accent)" onclick="window._rpRm(${w.id})">${w.t}</button>`).join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:16px">
          ${avail.map(w=>`<button class="chip" style="background:var(--surface);border-color:var(--border);color:var(--text)" onclick="window._rpAdd(${w.id})">${w.t}</button>`).join('')}
        </div>
        ${res===null?`<button class="bp" style="width:100%" onclick="window._rpChk()" ${placed.length===0?'disabled':''}>Check</button>`:
        `<div style="text-align:center">
          <div style="color:${res?'var(--ok)':'var(--err)'};font-weight:600">${res?'Correct!':'Not quite'}</div>
          ${!res?`<div style="color:var(--dim);font-size:13px;margin-top:4px">${s.w.join(' ')}</div>`:''}
          <button class="bp" style="margin-top:14px" onclick="window._rpNxt()">Next →</button>
        </div>`}
      </div>`;
    } else {
      // Translate mode
      app.innerHTML=`
      <div class="header"><button class="back" onclick="window._rpMenu()">←</button><div><div class="t">Translate</div><div class="s">${sIdx+1}/${batch.length} · Score: ${sc}</div></div></div>
      <div class="pbar"><div class="fill" style="width:${((sIdx+1)/batch.length*100)}%"></div></div>
      <div style="padding:28px 20px;text-align:center" class="fi">
        <div style="font-size:16px;font-weight:600;margin-bottom:20px">${s.en}</div>
        <input id="rpi" class="tinput" style="max-width:380px;border-color:${res===null?'var(--border)':res?'var(--ok)':'var(--err)'}${res!==null?';opacity:.5':''}" placeholder="Type pinyin..." ${res!==null?'readonly':''} onkeydown="if(event.key==='Enter'){${res!==null}?window._rpNxt():window._rpTChk()}">
        ${res===null?`<button class="bp" style="margin-top:10px" onclick="window._rpTChk()">Check</button>`:
        `<div style="margin-top:14px">
          <div style="color:${res?'var(--ok)':'var(--err)'};font-weight:600">${res?'Correct!':'Not quite'}</div>
          ${!res?`<div style="color:var(--dim);margin-top:4px;font-size:13px"><span style="color:var(--pinyin)">${s.py}</span></div>`:''}
          <button class="bp" style="margin-top:14px" onclick="window._rpNxt()">Next →</button>
        </div>`}
      </div>`;
      if(res===null)setTimeout(()=>{const el=$('rpi');if(el)el.focus()},50);
    }
  }

  window._rpMenu=()=>{mode='menu';sIdx=0;sc=0;res=null;prevRevealed=new Set();genBatch();d()};
  window._rpStart=m=>{mode=m;sIdx=0;sc=0;res=null;prevRevealed=new Set();genBatch();initRound();d()};
  window._rpReveal=i=>{prevRevealed.add(i);d()};
  window._rpAdd=id=>{const w=avail.find(x=>x.id===id);if(w){placed.push(w);avail=avail.filter(x=>x.id!==id);d()}};
  window._rpRm=id=>{if(res!==null)return;const w=placed.find(x=>x.id===id);if(w){avail.push(w);placed=placed.filter(x=>x.id!==id);d()}};
  window._rpChk=()=>{
    const s=batch[sIdx];
    res=placed.map(w=>w.t).join('')===s.w.join('');
    if(res)sc++;d();
  };
  window._rpTChk=()=>{
    if(res!==null)return;
    const el=$('rpi');if(!el||!el.value.trim())return;
    const s=batch[sIdx];
    res=el.value.trim().toLowerCase().replace(/\s+/g,' ')===s.py.toLowerCase().replace(/\s+/g,' ');
    if(res)sc++;d();
  };
  window._rpNxt=()=>{sIdx++;res=null;if(sIdx<batch.length)initRound();d()};

  genBatch();d();
}
