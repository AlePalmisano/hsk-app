<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>汉语 HSK Study App</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#121214;--surface:#1C1C20;--sh:#252529;--card:#1F1F24;--accent:#F0C040;--ok:#34D399;--err:#F87171;--text:#F4F4F6;--dim:#C4C4CC;--muted:#8E8E9A;--border:#363640;--pinyin:#7DB8FC;--hanzi:#C8A0FC;--hsk1:#7DB8FC;--hsk2:#B89CFA;--notes:#FCD34D}
body{font-family:'Noto Sans SC','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:520px;margin:0 auto;padding-bottom:40px}
.mono{font-family:'Space Mono',monospace}
button{font-family:inherit;cursor:pointer;transition:all .15s;color:inherit}
input{font-family:inherit}
.header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,.3)}
.header .back{background:none;border:none;color:var(--accent);font-size:22px;padding:4px;line-height:1}
.header .t{font-size:16px;font-weight:700;letter-spacing:.02em}
.header .s{font-size:11px;color:var(--dim);margin-top:1px}
.pbar{height:3px;background:var(--border);border-radius:2px;margin:8px 20px 0}
.pbar .fill{height:3px;background:var(--accent);border-radius:2px;transition:width .3s}
.pill{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:12px}
.pill.on{border-color:var(--accent);background:rgba(240,192,64,.15);color:var(--accent);font-weight:600}
.mbtn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-align:left;width:100%;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.mbtn:hover{background:var(--sh);border-color:var(--accent)}
.fcard{width:100%;max-width:380px;min-height:240px;background:var(--card);border:1px solid var(--border);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:28px;text-align:center;transition:all .3s;margin:0 auto;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.bp{padding:11px 24px;border-radius:10px;background:var(--accent);color:#121214;border:none;font-size:14px;font-weight:700}
.bp:disabled{background:var(--border);color:var(--muted);cursor:default}
.tinput{width:100%;padding:12px 16px;border-radius:10px;font-size:15px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tinput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,192,64,.18)}
.chip{padding:7px 12px;border-radius:8px;font-size:15px;font-weight:600;border:1px solid;display:inline-block}
.sarea{min-height:50px;padding:10px;border-radius:12px;border:1px dashed var(--muted);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:7px}
.mpair{padding:12px 10px;border-radius:10px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);text-align:center;width:100%;transition:all .15s}
.les-card{padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);width:100%;text-align:left;display:flex;gap:14px;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.les-card:hover{background:var(--sh);border-color:var(--accent)}
.les-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:.04em}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .25s ease}
</style>
</head>

<div class="app" id="app"></div>

"H2L3":[

"H2L5":[
  {title:"Adverb 就 (jiù)",ex:"就买这件吧",note:"就 means 'just/then' and implies quickness, decisiveness, or immediacy: 我们就去吧 (Let's just go). Before a number it means 'only': 就三块钱 (only 3 yuan). Very common and versatile."},

"H2L11":[

"H2L14":[

  {title:"虽然…但是… (suīrán…dànshì…)",ex:"虽然很累，但是很开心",note:"虽然 (although) + 但是 (but) are used together (unlike English where you pick one): 虽然他很忙，但是每天都运动. You can drop 虽然 but usually keep 但是."},

"H2L15":[

  {title:"Family size",lines:[
    {speaker:"A",cn:"你家有几口人？",py:"Nǐ jiā yǒu jǐ kǒu rén?",en:"How many people in your family?"},
    {speaker:"B",cn:"我家有四口人。爸爸、妈妈、哥哥和我。",py:"Wǒ jiā yǒu sì kǒu rén. Bàba, māma, gēge hé wǒ.",en:"Four people. Dad, mom, older brother, and me."},
    {speaker:"A",cn:"你有姐姐吗？",py:"Nǐ yǒu jiějie ma?",en:"Do you have an older sister?"},
    {speaker:"B",cn:"没有，我没有姐姐。你呢？",py:"Méiyǒu, wǒ méiyǒu jiějie. Nǐ ne?",en:"No, I don't. And you?"},
  ]},
  {title:"Siblings",lines:[
    {speaker:"A",cn:"你有弟弟妹妹吗？",py:"Nǐ yǒu dìdi mèimei ma?",en:"Do you have younger brothers or sisters?"},
    {speaker:"B",cn:"我有一个妹妹。",py:"Wǒ yǒu yí gè mèimei.",en:"I have a younger sister."},
    {speaker:"A",cn:"她多大了？",py:"Tā duō dà le?",en:"How old is she?"},
    {speaker:"B",cn:"她今年十岁。",py:"Tā jīnnián shí suì.",en:"She's 10 this year."},
  ]},
  {title:"Pets",lines:[
    {speaker:"A",cn:"你家有猫吗？",py:"Nǐ jiā yǒu māo ma?",en:"Does your family have a cat?"},
    {speaker:"B",cn:"有，我们有两只猫。",py:"Yǒu, wǒmen yǒu liǎng zhī māo.",en:"Yes, we have two cats."},
    {speaker:"A",cn:"我也想有一只猫。",py:"Wǒ yě xiǎng yǒu yì zhī māo.",en:"I also want to have a cat."},
  ]},
],
"H1L4":[
  {title:"What day is it",lines:[
    {speaker:"A",cn:"今天几号？",py:"Jīntiān jǐ hào?",en:"What date is today?"},
    {speaker:"B",cn:"今天十月五号。",py:"Jīntiān shí yuè wǔ hào.",en:"Today is October 5th."},
    {speaker:"A",cn:"今天星期几？",py:"Jīntiān xīngqī jǐ?",en:"What day of the week is it?"},
    {speaker:"B",cn:"今天星期三。",py:"Jīntiān xīngqī sān.",en:"Today is Wednesday."},
  ]},
  {title:"Birthday",lines:[
    {speaker:"A",cn:"你的生日是几月几号？",py:"Nǐ de shēngrì shì jǐ yuè jǐ hào?",en:"When is your birthday?"},
    {speaker:"B",cn:"我的生日是六月十号。",py:"Wǒ de shēngrì shì liù yuè shí hào.",en:"My birthday is June 10th."},
    {speaker:"A",cn:"明天是你的生日吗？",py:"Míngtiān shì nǐ de shēngrì ma?",en:"Is tomorrow your birthday?"},
    {speaker:"B",cn:"不是，是下个星期。",py:"Bú shì, shì xià ge xīngqī.",en:"No, it's next week."},
  ]},
  {title:"Making plans",lines:[
    {speaker:"A",cn:"明天是星期六，你做什么？",py:"Míngtiān shì xīngqī liù, nǐ zuò shénme?",en:"Tomorrow is Saturday, what are you doing?"},
    {speaker:"B",cn:"我想去买东西。",py:"Wǒ xiǎng qù mǎi dōngxi.",en:"I want to go shopping."},
    {speaker:"A",cn:"我也想去！",py:"Wǒ yě xiǎng qù!",en:"I want to go too!"},
  ]},
],
"H1L5":[
  {title:"Jobs",lines:[
    {speaker:"A",cn:"你是做什么工作的？",py:"Nǐ shì zuò shénme gōngzuò de?",en:"What do you do for work?"},
    {speaker:"B",cn:"我是医生，在医院工作。",py:"Wǒ shì yīshēng, zài yīyuàn gōngzuò.",en:"I'm a doctor, I work at a hospital."},
    {speaker:"A",cn:"你喜欢你的工作吗？",py:"Nǐ xǐhuan nǐ de gōngzuò ma?",en:"Do you like your job?"},
    {speaker:"B",cn:"喜欢，但是很忙。",py:"Xǐhuan, dànshì hěn máng.",en:"I like it, but I'm very busy."},
  ]},
  {title:"A friend's job",lines:[
    {speaker:"A",cn:"你的朋友在哪儿工作？",py:"Nǐ de péngyou zài nǎr gōngzuò?",en:"Where does your friend work?"},
    {speaker:"B",cn:"他在一家公司工作。",py:"Tā zài yì jiā gōngsī gōngzuò.",en:"He works at a company."},
    {speaker:"A",cn:"他做什么？",py:"Tā zuò shénme?",en:"What does he do?"},
    {speaker:"B",cn:"他是老师。在学校工作。",py:"Tā shì lǎoshī. Zài xuéxiào gōngzuò.",en:"He's a teacher. Works at a school."},
  ]},
  {title:"New colleague",lines:[
    {speaker:"A",cn:"你好，你是新同事吗？",py:"Nǐ hǎo, nǐ shì xīn tóngshì ma?",en:"Hello, are you the new colleague?"},
    {speaker:"B",cn:"是的，我叫小明。",py:"Shì de, wǒ jiào Xiǎo Míng.",en:"Yes, my name is Xiao Ming."},
    {speaker:"A",cn:"欢迎！你在哪儿工作？",py:"Huānyíng! Nǐ zài nǎr gōngzuò?",en:"Welcome! Where were you working before?"},
    {speaker:"B",cn:"我以前在医院工作。",py:"Wǒ yǐqián zài yīyuàn gōngzuò.",en:"I used to work at a hospital."},
  ]},
],
"H1L6":[
  {title:"Language abilities",lines:[
    {speaker:"A",cn:"你会说汉语吗？",py:"Nǐ huì shuō Hànyǔ ma?",en:"Can you speak Chinese?"},
    {speaker:"B",cn:"我会说一点儿。",py:"Wǒ huì shuō yìdiǎnr.",en:"I can speak a little."},
    {speaker:"A",cn:"你会写汉字吗？",py:"Nǐ huì xiě Hànzì ma?",en:"Can you write Chinese characters?"},
    {speaker:"B",cn:"不会，我只会读。",py:"Bú huì, wǒ zhǐ huì dú.",en:"No, I can only read."},
  ]},
  {title:"Learning together",lines:[
    {speaker:"A",cn:"你在学什么？",py:"Nǐ zài xué shénme?",en:"What are you studying?"},
    {speaker:"B",cn:"我在学汉语。你呢？",py:"Wǒ zài xué Hànyǔ. Nǐ ne?",en:"I'm learning Chinese. You?"},
    {speaker:"A",cn:"我也在学。你会说英语吗？",py:"Wǒ yě zài xué. Nǐ huì shuō Yīngyǔ ma?",en:"Me too. Can you speak English?"},
    {speaker:"B",cn:"会，我的英语很好。",py:"Huì, wǒ de Yīngyǔ hěn hǎo.",en:"Yes, my English is very good."},
  ]},
],
"H1L7":[
  {title:"Where do you live",lines:[
    {speaker:"A",cn:"你家在哪里？",py:"Nǐ jiā zài nǎlǐ?",en:"Where is your home?"},
    {speaker:"B",cn:"我家在学校旁边。",py:"Wǒ jiā zài xuéxiào pángbiān.",en:"My home is beside the school."},
    {speaker:"A",cn:"学校在哪儿？",py:"Xuéxiào zài nǎr?",en:"Where is the school?"},
    {speaker:"B",cn:"在医院前面。",py:"Zài yīyuàn qiánmiàn.",en:"In front of the hospital."},
  ]},
  {title:"Looking for the cat",lines:[
    {speaker:"A",cn:"猫在哪儿？",py:"Māo zài nǎr?",en:"Where is the cat?"},
    {speaker:"B",cn:"在桌子下面。",py:"Zài zhuōzi xiàmiàn.",en:"Under the table."},
    {speaker:"A",cn:"我的书在哪里？",py:"Wǒ de shū zài nǎlǐ?",en:"Where is my book?"},
    {speaker:"B",cn:"在椅子上面。",py:"Zài yǐzi shàngmiàn.",en:"On the chair."},
  ]},
  {title:"The neighborhood",lines:[
    {speaker:"A",cn:"你家旁边有什么？",py:"Nǐ jiā pángbiān yǒu shénme?",en:"What's near your home?"},
    {speaker:"B",cn:"有一个商店和一个饭店。",py:"Yǒu yí gè shāngdiàn hé yí gè fàndiàn.",en:"There's a shop and a restaurant."},
    {speaker:"A",cn:"饭店在商店后面吗？",py:"Fàndiàn zài shāngdiàn hòumiàn ma?",en:"Is the restaurant behind the shop?"},
    {speaker:"B",cn:"不是，在商店左边。",py:"Bú shì, zài shāngdiàn zuǒbiān.",en:"No, it's to the left of the shop."},
  ]},
],
"H1L8":[
  {title:"What time",lines:[
    {speaker:"A",cn:"现在几点？",py:"Xiànzài jǐ diǎn?",en:"What time is it now?"},
    {speaker:"B",cn:"现在三点半。",py:"Xiànzài sān diǎn bàn.",en:"It's 3:30."},
    {speaker:"A",cn:"你几点去吃饭？",py:"Nǐ jǐ diǎn qù chīfàn?",en:"What time are you going to eat?"},
    {speaker:"B",cn:"六点。你呢？",py:"Liù diǎn. Nǐ ne?",en:"At 6. And you?"},
  ]},
  {title:"Daily schedule",lines:[
    {speaker:"A",cn:"你早上几点起床？",py:"Nǐ zǎoshang jǐ diǎn qǐchuáng?",en:"What time do you get up in the morning?"},
    {speaker:"B",cn:"七点半。",py:"Qī diǎn bàn.",en:"7:30."},
    {speaker:"A",cn:"几点上课？",py:"Jǐ diǎn shàngkè?",en:"What time does class start?"},
    {speaker:"B",cn:"八点上课，下午三点下课。",py:"Bā diǎn shàngkè, xiàwǔ sān diǎn xiàkè.",en:"Class starts at 8, ends at 3 in the afternoon."},
  ]},
  {title:"Evening plans",lines:[
    {speaker:"A",cn:"晚上你做什么？",py:"Wǎnshang nǐ zuò shénme?",en:"What do you do in the evening?"},
    {speaker:"B",cn:"我看电视。你呢？",py:"Wǒ kàn diànshì. Nǐ ne?",en:"I watch TV. You?"},
    {speaker:"A",cn:"我学习。我十一点睡觉。",py:"Wǒ xuéxí. Wǒ shíyī diǎn shuìjiào.",en:"I study. I sleep at 11."},
  ]},
],
"H1L9":[
  {title:"Ordering food",lines:[
    {speaker:"A",cn:"你想吃什么？",py:"Nǐ xiǎng chī shénme?",en:"What do you want to eat?"},
    {speaker:"B",cn:"我想吃米饭。",py:"Wǒ xiǎng chī mǐfàn.",en:"I want to eat rice."},
    {speaker:"A",cn:"你想喝什么？",py:"Nǐ xiǎng hē shénme?",en:"What do you want to drink?"},
    {speaker:"B",cn:"来一杯咖啡。",py:"Lái yì bēi kāfēi.",en:"A cup of coffee please."},
  ]},
  {title:"At the restaurant",lines:[
    {speaker:"A",cn:"今天的菜很好吃。",py:"Jīntiān de cài hěn hǎochī.",en:"Today's dishes are delicious."},
    {speaker:"B",cn:"你想吃水果吗？",py:"Nǐ xiǎng chī shuǐguǒ ma?",en:"Do you want to eat fruit?"},
    {speaker:"A",cn:"好，我想吃苹果。",py:"Hǎo, wǒ xiǎng chī píngguǒ.",en:"OK, I want an apple."},
    {speaker:"B",cn:"我不想吃水果，来一杯茶吧。",py:"Wǒ bù xiǎng chī shuǐguǒ, lái yì bēi chá ba.",en:"I don't want fruit, I'll have tea."},
  ]},
  {title:"Hotpot invitation",lines:[
    {speaker:"A",cn:"你吃过火锅吗？",py:"Nǐ chīguo huǒguō ma?",en:"Have you ever eaten hotpot?"},
    {speaker:"B",cn:"没有，火锅好吃吗？",py:"Méiyǒu, huǒguō hǎochī ma?",en:"No, is hotpot delicious?"},
    {speaker:"A",cn:"非常好吃！我们去吃火锅吧！",py:"Fēicháng hǎochī! Wǒmen qù chī huǒguō ba!",en:"Extremely delicious! Let's go eat hotpot!"},
    {speaker:"B",cn:"好啊！",py:"Hǎo a!",en:"Great!"},
  ]},
],
"H1L10":[
  {title:"In the library",lines:[
    {speaker:"A",cn:"我能坐这儿吗？",py:"Wǒ néng zuò zhèr ma?",en:"Can I sit here?"},
    {speaker:"B",cn:"能，请坐。",py:"Néng, qǐng zuò.",en:"Yes, please sit."},
    {speaker:"A",cn:"你在看什么书？",py:"Nǐ zài kàn shénme shū?",en:"What book are you reading?"},
    {speaker:"B",cn:"一本很有意思的书。",py:"Yì běn hěn yǒu yìsi de shū.",en:"A very interesting book."},
  ]},
  {title:"Movie night",lines:[
    {speaker:"A",cn:"你想看电影吗？",py:"Nǐ xiǎng kàn diànyǐng ma?",en:"Do you want to watch a movie?"},
    {speaker:"B",cn:"好啊！我们看什么？",py:"Hǎo a! Wǒmen kàn shénme?",en:"Sure! What shall we watch?"},
    {speaker:"A",cn:"我的电脑在那儿。",py:"Wǒ de diànnǎo zài nàr.",en:"My computer is over there."},
    {speaker:"B",cn:"好，我们一起看电视吧。",py:"Hǎo, wǒmen yìqǐ kàn diànshì ba.",en:"OK, let's watch TV together."},
  ]},
],
"H1L11":[
  {title:"Going to work",lines:[
    {speaker:"A",cn:"你怎么去工作？",py:"Nǐ zěnme qù gōngzuò?",en:"How do you get to work?"},
    {speaker:"B",cn:"我坐地铁去。你呢？",py:"Wǒ zuò dìtiě qù. Nǐ ne?",en:"I take the subway. You?"},
    {speaker:"A",cn:"我坐出租车。",py:"Wǒ zuò chūzūchē.",en:"I take a taxi."},
    {speaker:"B",cn:"出租车太贵了！",py:"Chūzūchē tài guì le!",en:"Taxis are too expensive!"},
  ]},
  {title:"Travel plans",lines:[
    {speaker:"A",cn:"你去哪儿？",py:"Nǐ qù nǎr?",en:"Where are you going?"},
    {speaker:"B",cn:"我去机场，坐飞机回家。",py:"Wǒ qù jīchǎng, zuò fēijī huí jiā.",en:"I'm going to the airport, flying home."},
    {speaker:"A",cn:"火车几点到？",py:"Huǒchē jǐ diǎn dào?",en:"What time does the train arrive?"},
    {speaker:"B",cn:"下午三点到。",py:"Xiàwǔ sān diǎn dào.",en:"It arrives at 3 PM."},
  ]},
],
"H1L12":[
  {title:"Shopping for clothes",lines:[
    {speaker:"A",cn:"这件衣服多少钱？",py:"Zhè jiàn yīfu duōshao qián?",en:"How much is this piece of clothing?"},
    {speaker:"B",cn:"两百块。",py:"Liǎng bǎi kuài.",en:"200 yuan."},
    {speaker:"A",cn:"太贵了！便宜一点儿吧。",py:"Tài guì le! Piányi yìdiǎnr ba.",en:"Too expensive! A bit cheaper please."},
    {speaker:"B",cn:"好吧，一百五。",py:"Hǎo ba, yì bǎi wǔ.",en:"OK, 150."},
  ]},
  {title:"At the supermarket",lines:[
    {speaker:"A",cn:"你想买什么？",py:"Nǐ xiǎng mǎi shénme?",en:"What do you want to buy?"},
    {speaker:"B",cn:"我想买水果。苹果多少钱？",py:"Wǒ xiǎng mǎi shuǐguǒ. Píngguǒ duōshao qián?",en:"I want fruit. How much are apples?"},
    {speaker:"A",cn:"十块一斤。",py:"Shí kuài yì jīn.",en:"10 yuan per jin."},
    {speaker:"B",cn:"不贵，我买两斤。",py:"Bú guì, wǒ mǎi liǎng jīn.",en:"Not expensive, I'll buy two jin."},
  ]},
],
"H1L13":[
  {title:"Cooking together",lines:[
    {speaker:"A",cn:"你喜欢吃中国菜吗？",py:"Nǐ xǐhuan chī Zhōngguó cài ma?",en:"Do you like Chinese food?"},
    {speaker:"B",cn:"非常喜欢！我最喜欢吃火锅。",py:"Fēicháng xǐhuan! Wǒ zuì xǐhuan chī huǒguō.",en:"Very much! I like hotpot the most."},
    {speaker:"A",cn:"你会做饭吗？",py:"Nǐ huì zuòfàn ma?",en:"Can you cook?"},
    {speaker:"B",cn:"我在学做中国菜。",py:"Wǒ zài xué zuò Zhōngguó cài.",en:"I'm learning to cook Chinese food."},
  ]},
  {title:"Food preferences",lines:[
    {speaker:"A",cn:"你喜欢吃什么水果？",py:"Nǐ xǐhuan chī shénme shuǐguǒ?",en:"What fruit do you like?"},
    {speaker:"B",cn:"我喜欢吃苹果。你呢？",py:"Wǒ xǐhuan chī píngguǒ. Nǐ ne?",en:"I like apples. You?"},
    {speaker:"A",cn:"我们都喜欢吃水果。",py:"Wǒmen dōu xǐhuan chī shuǐguǒ.",en:"We all like eating fruit."},
    {speaker:"B",cn:"他也喜欢，他最喜欢吃蛋糕。",py:"Tā yě xǐhuan, tā zuì xǐhuan chī dàngāo.",en:"He likes it too, he likes cake the most."},
  ]},
],
"H1L14":[
  {title:"Movie experience",lines:[
    {speaker:"A",cn:"你看过那个电影吗？",py:"Nǐ kànguo nàge diànyǐng ma?",en:"Have you seen that movie?"},
    {speaker:"B",cn:"看过，非常好看。",py:"Kànguo, fēicháng hǎokàn.",en:"Yes, it's really good."},
    {speaker:"A",cn:"我没看过。",py:"Wǒ méi kànguo.",en:"I haven't seen it."},
    {speaker:"B",cn:"我们一起去看吧！",py:"Wǒmen yìqǐ qù kàn ba!",en:"Let's go watch it together!"},
  ]},
  {title:"Phone call",lines:[
    {speaker:"A",cn:"昨天我给你打电话了。",py:"Zuótiān wǒ gěi nǐ dǎ diànhuà le.",en:"I called you yesterday."},
    {speaker:"B",cn:"对不起，我没接。你有什么事？",py:"Duìbuqǐ, wǒ méi jiē. Nǐ yǒu shénme shì?",en:"Sorry, I didn't answer. What's up?"},
    {speaker:"A",cn:"我想问你去过中国吗？",py:"Wǒ xiǎng wèn nǐ qùguo Zhōngguó ma?",en:"I wanted to ask, have you been to China?"},
    {speaker:"B",cn:"去过两次，我很高兴。",py:"Qùguo liǎng cì, wǒ hěn gāoxìng.",en:"Twice, I was very happy."},
  ]},
],
"H1L15":[
  {title:"Weather chat",lines:[
    {speaker:"A",cn:"今天天气怎么样？",py:"Jīntiān tiānqì zěnmeyàng?",en:"How's the weather today?"},
    {speaker:"B",cn:"今天很热。",py:"Jīntiān hěn rè.",en:"It's very hot today."},
    {speaker:"A",cn:"明天呢？",py:"Míngtiān ne?",en:"What about tomorrow?"},
    {speaker:"B",cn:"明天可能要下雨。",py:"Míngtiān kěnéng yào xiàyǔ.",en:"It might rain tomorrow."},
  ]},
  {title:"Rainy day",lines:[
    {speaker:"A",cn:"下雨了！我们回家吧。",py:"Xiàyǔ le! Wǒmen huí jiā ba.",en:"It's raining! Let's go home."},
    {speaker:"B",cn:"好，快一点儿走。",py:"Hǎo, kuài yìdiǎnr zǒu.",en:"OK, walk a bit faster."},
    {speaker:"A",cn:"昨天太冷了。",py:"Zuótiān tài lěng le.",en:"Yesterday was too cold."},
    {speaker:"B",cn:"是啊，今天的天气好多了。",py:"Shì a, jīntiān de tiānqì hǎo duō le.",en:"Yes, today's weather is much better."},
  ]},
],
"H2L1":[
  {title:"Planning a trip",lines:[
    {speaker:"A",cn:"我要去北京旅游，你觉得什么时候去最好？",py:"Wǒ yào qù Běijīng lǚyóu, nǐ juéde shénme shíhou qù zuì hǎo?",en:"I want to travel to Beijing, when do you think is best?"},
    {speaker:"B",cn:"九月去北京旅游最好。",py:"Jiǔ yuè qù Běijīng lǚyóu zuì hǎo.",en:"September is the best time to visit Beijing."},
    {speaker:"A",cn:"为什么？",py:"Wèi shénme?",en:"Why?"},
    {speaker:"B",cn:"因为九月的北京天气不冷也不热。",py:"Yīnwèi jiǔ yuè de Běijīng tiānqì bù lěng yě bú rè.",en:"Because Beijing in September is neither cold nor hot."},
  ]},
  {title:"Sports afternoon",lines:[
    {speaker:"A",cn:"你喜欢什么运动？",py:"Nǐ xǐhuan shénme yùndòng?",en:"What sport do you like?"},
    {speaker:"B",cn:"我最喜欢踢足球。",py:"Wǒ zuì xǐhuan tī zúqiú.",en:"I like playing football the most."},
    {speaker:"A",cn:"下午我们一起去踢足球吧。",py:"Xiàwǔ wǒmen yìqǐ qù tī zúqiú ba.",en:"Let's go play football this afternoon."},
    {speaker:"B",cn:"好啊！",py:"Hǎo a!",en:"Great!"},
  ]},
  {title:"Buying furniture",lines:[
    {speaker:"A",cn:"我们要不要买几个新的椅子？",py:"Wǒmen yào bu yào mǎi jǐ gè xīn de yǐzi?",en:"Should we buy some new chairs?"},
    {speaker:"B",cn:"好啊。什么时候去买？",py:"Hǎo a. Shénme shíhou qù mǎi?",en:"Sure. When shall we go buy them?"},
    {speaker:"A",cn:"明天下午怎么样？",py:"Míngtiān xiàwǔ zěnmeyàng?",en:"How about tomorrow afternoon?"},
    {speaker:"B",cn:"好，三点多去吧。",py:"Hǎo, sān diǎn duō qù ba.",en:"OK, let's go around 3."},
  ]},
  {title:"The cat",lines:[
    {speaker:"A",cn:"桌子下面有个猫。",py:"Zhuōzi xiàmiàn yǒu gè māo.",en:"There's a cat under the table."},
    {speaker:"B",cn:"那是我的猫，它叫花花。",py:"Nà shì wǒ de māo, tā jiào Huāhua.",en:"That's my cat, it's called Huahua."},

"H2L3":[

"H2L4":[

"H2L5":[

"H2L6":[

],
"H2L7":[
  {title:"Commute",lines:[
    {speaker:"A",cn:"你家离公司远吗？",py:"Nǐ jiā lí gōngsī yuǎn ma?",en:"Do you live far from your company?"},

"H2L8":[

"H2L12":[

const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b};

}

// ═══ GET VOCAB FOR CURRENT CONTEXT ═══
function getV(){
  if(S.lessonId==='all'){
    const all=LESSONS.flatMap(l=>l.vocab);
    return [...all,...NOTES_VOCAB.map(v=>({h:v.h,p:v.p,e:v.e}))];
  }
  if(S.lessonId==='notes')return NOTES_VOCAB.map(v=>({h:v.h,p:v.p,e:v.e}));
  const L=LESSONS.find(l=>l.id===S.lessonId);
  return L?L.vocab:[];
}
function getS(){
  if(S.lessonId==='all')return LESSONS.flatMap(l=>l.sentences);
  const L=LESSONS.find(l=>l.id===S.lessonId);
  return L?L.sentences:[];
}
function goBack(){
  if(S.lessonId==='all'||S.lessonId==='notes'){S.screen='home';S.lessonId=null;}
  else{S.screen='lesson';}
  render();
}

// ═══ FLASHCARDS ═══
function renderFlash(){
  const cards=shuffle(getV());
  if(!cards.length){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Flashcards</div></div></div><p style="padding:40px;color:var(--dim);text-align:center">No cards available.</p>`;return}
  let i=0,f=false,k=0;
  function d(){
    const c=cards[i%cards.length],pct=((i%cards.length+1)/cards.length*100);
    app.innerHTML=`
    <div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Flashcards</div><div class="s">${i%cards.length+1}/${cards.length} · ${k} known</div></div></div>
    <div class="pbar"><div class="fill" style="width:${pct}%"></div></div>
    <div style="padding:36px 20px;display:flex;flex-direction:column;align-items:center" class="fi">
      <div class="fcard" onclick="window._ff()">
        ${!f?`<div style="font-size:17px;font-weight:500">${c.e}</div><div style="margin-top:20px;font-size:12px;color:var(--muted)">tap to reveal</div>`
        :`<div style="font-size:44px;font-weight:700;color:var(--hanzi)">${c.h}</div><div style="font-size:20px;color:var(--pinyin);margin-top:8px">${c.p}</div><div style="font-size:14px;color:var(--dim);margin-top:8px">${c.e}</div>`}
      </div>
      ${f?`<div style="display:flex;gap:12px;margin-top:20px;width:100%;max-width:380px">
        <button style="flex:1;padding:13px;border-radius:10px;border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.1);color:var(--err);font-size:14px;font-weight:600" onclick="window._fn(0)">Still learning</button>
        <button style="flex:1;padding:13px;border-radius:10px;border:1px solid rgba(52,211,153,.3);background:rgba(52,211,153,.1);color:var(--ok);font-size:14px;font-weight:600" onclick="window._fn(1)">Got it!</button>
      </div>`:''}
    </div>`;
  }
  window._ff=()=>{f=!f;d()};
  window._fn=ok=>{if(ok)k++;f=false;i++;d()};
  d();
}

// ═══ QUIZ ═══
function renderQuiz(){
  const vocab=getV();
  if(vocab.length<4){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Quiz</div></div></div><p style="padding:40px;color:var(--dim);text-align:center">Need at least 4 words.</p>`;return}
  const qs=shuffle(vocab).slice(0,Math.min(20,vocab.length)).map(q=>{
    const wr=shuffle(vocab.filter(v=>v.p!==q.p)).slice(0,3);
    return{...q,opts:shuffle([q,...wr]),dir:Math.random()>.5?'e2p':'p2e'};
  });
  let idx=0,sc=0,sel=null;
  function d(){
    if(idx>=qs.length){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Quiz Complete</div></div></div><div style="padding:40px;text-align:center" class="fi"><div class="mono" style="font-size:56px;font-weight:900;color:var(--accent)">${sc}/${qs.length}</div><div style="font-size:15px;color:var(--dim);margin-top:8px">${sc>=qs.length*.8?'Excellent!':sc>=qs.length*.5?'Good progress!':'Keep practicing!'}</div><button class="bp" style="margin-top:20px" onclick="goBack()">Done</button></div>`;return}
    const q=qs[idx];
    app.innerHTML=`
    <div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Quiz</div><div class="s">Q${idx+1}/${qs.length} · Score: ${sc}</div></div></div>
    <div class="pbar"><div class="fill" style="width:${((idx+1)/qs.length*100)}%"></div></div>
    <div style="padding:28px 20px" class="fi">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">${q.dir==='e2p'?'What is the pinyin for:':'What does this mean?'}</div>
        ${q.dir==='e2p'?`<div style="font-size:20px;font-weight:600">${q.e}</div>`:`<div style="font-size:32px;font-weight:700;color:var(--hanzi)">${q.h}</div><div style="font-size:16px;color:var(--pinyin);margin-top:4px">${q.p}</div>`}
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${q.opts.map((o,j)=>{
          let st='';
          if(sel!==null){if(o.p===q.p)st='border-color:var(--ok);background:rgba(52,211,153,.12)';else if(j===sel)st='border-color:var(--err);background:rgba(248,113,113,.12)'}
          return`<button style="padding:13px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);text-align:left;font-size:14px;color:var(--text);width:100%;font-family:inherit;cursor:pointer;${st}" onclick="window._qs(${j})">${q.dir==='e2p'?`<span style="color:var(--pinyin)">${o.p}</span> <span style="color:var(--hanzi);margin-left:6px">${o.h}</span>`:`${o.e}`}</button>`;
        }).join('')}
      </div>
    </div>`;
  }
  window._qs=j=>{if(sel!==null)return;sel=j;if(qs[idx].opts[j].p===qs[idx].p)sc++;d();setTimeout(()=>{sel=null;idx++;d()},900)};
  d();
}

// ═══ TYPE ═══
function renderType(){
  const cards=shuffle(getV()).slice(0,15);
  if(!cards.length){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Type</div></div></div><p style="padding:40px;color:var(--dim);text-align:center">No words.</p>`;return}
  let mode=null,idx=0,sc=0,res=null;
  function d(){
    if(!mode){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Type Answer</div></div></div><div style="padding:36px 20px;text-align:center"><div style="font-size:15px;color:var(--dim);margin-bottom:20px">Choose direction:</div><button class="mbtn" style="margin-bottom:8px;justify-content:center" onclick="window._tm('e2p')"><span style="color:var(--pinyin);font-weight:600">English → Pinyin</span></button><button class="mbtn" style="justify-content:center" onclick="window._tm('p2e')"><span style="color:var(--accent);font-weight:600">Pinyin → English</span></button></div>`;return}
    if(idx>=cards.length){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Done</div></div></div><div style="padding:40px;text-align:center" class="fi"><div class="mono" style="font-size:56px;font-weight:900;color:var(--accent)">${sc}/${cards.length}</div><button class="bp" style="margin-top:20px" onclick="goBack()">Done</button></div>`;return}
    const c=cards[idx];
    app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Type Answer</div><div class="s">${idx+1}/${cards.length} · Score: ${sc}</div></div></div>
    <div style="padding:28px 20px;text-align:center" class="fi">
      ${mode==='e2p'?`<div style="font-size:20px;font-weight:600;margin-bottom:6px">${c.e}</div>`:`<div style="font-size:32px;font-weight:700;color:var(--hanzi)">${c.h}</div><div style="font-size:16px;color:var(--pinyin);margin-top:4px;margin-bottom:6px">${c.p}</div>`}
      <div style="max-width:340px;margin:20px auto 0">
        ${res===null?`<input id="ti" class="tinput" placeholder="${mode==='e2p'?'Type pinyin':'Type English'}" onkeydown="if(event.key==='Enter')window._tc()">
        <button class="bp" style="margin-top:10px" onclick="window._tc()">Check</button>`
        :`<div style="padding:12px 16px;border-radius:10px;border:1px solid ${res?'var(--ok)':'var(--err)'};background:${res?'rgba(52,211,153,.08)':'rgba(248,113,113,.08)'};font-size:15px;color:var(--dim);text-align:left">${window._lastInput||''}</div>
        <div style="margin-top:14px"><div style="color:${res?'var(--ok)':'var(--err)'};font-weight:600">${res?'Correct!':'Not quite'}</div>${!res?`<div style="color:var(--dim);margin-top:4px;font-size:13px">Answer: <span style="color:var(--accent)">${mode==='e2p'?c.p:c.e}</span></div>`:''}<button class="bp" style="margin-top:14px" onclick="window._tn()">Next →</button></div>`}
      </div>
    </div>`;
    if(res===null)setTimeout(()=>{const el=$('ti');if(el)el.focus()},50);
  }
  window._tm=m=>{mode=m;d()};
  window._tc=()=>{if(res!==null)return;const el=$('ti');if(!el||!el.value.trim())return;window._lastInput=el.value;const ans=mode==='e2p'?cards[idx].p:cards[idx].e;res=el.value.trim().toLowerCase().replace(/\s+/g,' ')===ans.toLowerCase().replace(/\s+/g,' ');if(res)sc++;d()};
  window._tn=()=>{res=null;idx++;window._lastInput='';d()};
  d();
}

// ═══ MATCH ═══
function renderMatch(){
  const vocab=getV();
  if(vocab.length<3){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Match</div></div></div><p style="padding:40px;color:var(--dim);text-align:center">Need at least 3 words.</p>`;return}
  const pk=shuffle(vocab).slice(0,Math.min(6,vocab.length));
  const L=pk.map((v,i)=>({id:'l'+i,t:v.e,pid:i}));
  const R=shuffle(pk.map((v,i)=>({id:'r'+i,t:v.p,h:v.h,pid:i})));
  let sl=null,sp=null,mt=[],wr=null,at=0;
  function d(){
    if(mt.length===L.length){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Match</div></div></div><div style="padding:36px;text-align:center" class="fi"><div style="font-size:38px">🎉</div><div style="font-size:18px;font-weight:700;color:var(--ok);margin-top:8px">All matched!</div><div style="font-size:13px;color:var(--dim);margin-top:6px">${at} attempts</div><button class="bp" style="margin-top:18px" onclick="goBack()">Done</button></div>`;return}
    app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Matching</div><div class="s">${mt.length}/${L.length} · ${at} tries</div></div></div>
    <div style="padding:18px 20px" class="fi"><div style="font-size:12px;color:var(--muted);margin-bottom:12px;text-align:center">Tap English, then its pinyin match</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div style="display:flex;flex-direction:column;gap:8px">${L.map(x=>{const m=mt.includes(x.pid),s=sl===x.id;return`<button class="mpair" style="${m?'border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.1);opacity:.5':s?'border-color:var(--accent);background:rgba(240,192,64,.15)':''}" onclick="window._ml('${x.id}',${x.pid})">${x.t}</button>`}).join('')}</div>
      <div style="display:flex;flex-direction:column;gap:8px">${R.map(x=>{const m=mt.includes(x.pid),w=wr===x.id;return`<button class="mpair" style="${m?'border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.1);opacity:.5':w?'border-color:var(--err);background:rgba(248,113,113,.12)':''}" onclick="window._mr('${x.id}',${x.pid})"><div style="color:var(--hanzi);font-weight:700;font-size:17px">${x.h}</div><div style="color:var(--pinyin);font-size:12px;margin-top:1px">${x.t}</div></button>`}).join('')}</div>
    </div></div>`;
  }
  window._ml=(id,pid)=>{if(mt.includes(pid))return;sl=id;sp=pid;d()};
  window._mr=(id,pid)=>{if(mt.includes(pid)||sl===null)return;at++;if(sp===pid){mt.push(pid);sl=null;d()}else{wr=id;d();setTimeout(()=>{wr=null;sl=null;d()},500)}};
  d();
}

// ═══ SENTENCES ═══
function renderSent(){
  const sents=shuffle(getS());
  if(!sents.length){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Sentences</div></div></div><p style="padding:40px;color:var(--dim);text-align:center">No sentences for this lesson.</p>`;return}
  let mode=null,idx=0,sc=0,placed=[],avail=[],res=null;
  function init(){const s=sents[idx%sents.length];avail=shuffle(s.w.map((w,i)=>({id:i,t:w})));placed=[];res=null}
  function d(){
    if(!mode){app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Sentences</div></div></div><div style="padding:36px 20px;text-align:center"><div style="font-size:15px;color:var(--dim);margin-bottom:20px">Choose mode:</div><button class="mbtn" style="margin-bottom:8px;justify-content:center" onclick="window._sm('r')"><span style="color:var(--accent);font-weight:600">🧩 Rearrange Words</span></button><button class="mbtn" style="justify-content:center" onclick="window._sm('t')"><span style="color:var(--pinyin);font-weight:600">✍️ Translate to Pinyin</span></button></div>`;return}
    const s=sents[idx%sents.length];
    if(mode==='r'){
      app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Rearrange</div><div class="s">${idx%sents.length+1}/${sents.length} · Score: ${sc}</div></div></div>
      <div style="padding:20px" class="fi">
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:16px;font-weight:500">${s.e}</div>
          <div style="font-size:13px;color:var(--pinyin);margin-top:4px">${s.p}</div>
        </div>
        <div class="sarea" style="border-color:${res===null?'var(--border)':res?'var(--ok)':'var(--err)'}">
          ${placed.length===0?'<span style="color:var(--muted);font-size:12px;margin:auto">Tap words to build sentence</span>':''}
          ${placed.map(w=>`<button class="chip" style="background:rgba(240,192,64,.15);border-color:rgba(240,192,64,.35);color:var(--accent)" onclick="window._sr(${w.id})">${w.t}</button>`).join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:16px">
          ${avail.map(w=>`<button class="chip" style="background:var(--surface);border-color:var(--border);color:var(--text)" onclick="window._sa(${w.id})">${w.t}</button>`).join('')}
        </div>
        ${res===null?`<button class="bp" style="width:100%" onclick="window._sc()" ${placed.length===0?'disabled':''}>Check</button>`:`<div style="text-align:center"><div style="color:${res?'var(--ok)':'var(--err)'};font-weight:600">${res?'Correct!':'Not quite'}</div>${!res?`<div style="color:var(--dim);font-size:13px;margin-top:4px">${s.w.join(' ')}</div>`:''}<button class="bp" style="margin-top:14px" onclick="window._sn()">Next →</button></div>`}
      </div>`;
    }else{
      app.innerHTML=`<div class="header"><button class="back" onclick="goBack()">←</button><div><div class="t">Translate</div><div class="s">${idx%sents.length+1}/${sents.length} · Score: ${sc}</div></div></div>
      <div style="padding:28px 20px;text-align:center" class="fi">
        <div style="font-size:16px;font-weight:600;margin-bottom:20px">${s.e}</div>
        <input id="si" class="tinput" style="max-width:380px;border-color:${res===null?'var(--border)':res?'var(--ok)':'var(--err)'}${res!==null?';opacity:.5':''}" placeholder="Type pinyin..." ${res!==null?'readonly':''} onkeydown="if(event.key==='Enter'){${res!==null}?window._sn():window._stc()}">
        ${res===null?`<button class="bp" style="margin-top:10px" onclick="window._stc()">Check</button>`:`<div style="margin-top:14px"><div style="color:${res?'var(--ok)':'var(--err)'};font-weight:600">${res?'Correct!':'Not quite'}</div>${!res?`<div style="color:var(--dim);margin-top:4px;font-size:13px"><span style="color:var(--pinyin)">${s.p}</span></div>`:''}<button class="bp" style="margin-top:14px" onclick="window._sn()">Next →</button></div>`}
      </div>`;
      if(res===null)setTimeout(()=>{const el=$('si');if(el)el.focus()},50);
    }
  }
  window._sm=m=>{mode=m;init();d()};
  window._sa=id=>{const w=avail.find(x=>x.id===id);if(w){placed.push(w);avail=avail.filter(x=>x.id!==id);d()}};
  window._sr=id=>{if(res!==null)return;const w=placed.find(x=>x.id===id);if(w){avail.push(w);placed=placed.filter(x=>x.id!==id);d()}};
  window._sc=()=>{const s=sents[idx%sents.length];res=placed.map(w=>w.t).join('')===s.w.join('');if(res)sc++;d()};
  window._stc=()=>{if(res!==null)return;const el=$('si');if(!el||!el.value.trim())return;const s=sents[idx%sents.length];res=el.value.trim().toLowerCase().replace(/\s+/g,' ')===s.p.toLowerCase().replace(/\s+/g,' ');if(res)sc++;d()};
  window._sn=()=>{idx++;res=null;init();d()};
  d();
}

// ═══ DIALOGUE SCREEN ═══
function renderDialogue(){
  const L=LESSONS.find(l=>l.id===S.lessonId);
  if(!L)return;
  const dlgs=DIALOGUES[L.id]||[];
  const clr=L.level==='HSK1'?'var(--hsk1)':'var(--hsk2)';

  // Build unified dialogue list (from DIALOGUES data or from sentence pairs)
  let allDialogues=[];
  if(dlgs.length){
    allDialogues=dlgs;
  } else if(L.sentences.length>=2){
    const lines=[];
    for(let i=0;i<L.sentences.length;i++){
      lines.push({speaker:i%2===0?'A':'B', py:L.sentences[i].p||L.sentences[i].py, en:L.sentences[i].e||L.sentences[i].en, cn:''});
    }
    allDialogues=[{title:L.titleEn, lines}];
  }

  if(!allDialogues.length){
    app.innerHTML=`<div class="header"><button class="back" onclick="S.screen='lesson';render()">←</button><div><div class="t">Dialogue Practice</div><div class="s">${L.level} · Lesson ${L.num}</div></div></div><p style="color:var(--muted);text-align:center;padding:40px">No dialogues for this lesson yet.</p>`;
    return;
  }

  // State: which dialogue, which lines are revealed
  let dIdx=0;
  let revealed=new Set(); // set of line indices that have been revealed

  function d(){
    const dlg=allDialogues[dIdx];
    const total=dlg.lines.length;
    const allRevealed=revealed.size>=total;

    app.innerHTML=`
    <div class="header"><button class="back" onclick="S.screen='lesson';render()">←</button><div><div class="t">Dialogue Practice</div><div class="s">${L.level} · Lesson ${L.num}${allDialogues.length>1?' · Dialogue '+(dIdx+1)+'/'+allDialogues.length:''}</div></div></div>
    <div style="padding:20px" class="fi">
      <div style="padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px">
        <div style="font-size:14px;font-weight:700;color:${clr};margin-bottom:6px">${dlg.title}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Read the English, then tap each line to reveal the Chinese translation. Test yourself before peeking!</div>

        ${dlg.lines.map((l,i)=>{
          const isRevealed=revealed.has(i);
          const hasCn=l.cn&&l.cn.length>0;
          return `
          <div style="margin-bottom:14px">
            <div style="display:flex;gap:10px;align-items:flex-start">
              <div style="width:28px;height:28px;border-radius:50%;background:${l.speaker==='A'?clr+'22':'var(--accent)22'};color:${l.speaker==='A'?clr:'var(--accent)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${l.speaker}</div>
              <div style="flex:1">
                <div style="font-size:14px;color:var(--text);font-weight:500;margin-bottom:6px">${l.en}</div>
                ${isRevealed?`
                  <div style="padding:10px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
                    ${hasCn?`<div style="font-size:16px;font-weight:600;color:var(--hanzi);margin-bottom:3px">${l.cn}</div>`:''}
                    <div style="font-size:14px;color:var(--pinyin);font-weight:500">${l.py}</div>
                  </div>
                `:`
                  <button onclick="window._dlgReveal(${i})" style="width:100%;padding:10px 12px;background:var(--bg);border-radius:8px;border:1px dashed var(--border);color:var(--muted);font-size:13px;font-family:inherit;text-align:left;cursor:pointer">
                    👆 Tap to reveal Chinese
                  </button>
                `}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div style="display:flex;gap:8px">
        ${allRevealed?`<button class="bp" style="flex:1" onclick="window._dlgReset()">🔄 Hide All & Retry</button>`:`<button class="bp" style="flex:1" onclick="window._dlgRevealAll()">👁 Reveal All</button>`}
        ${allDialogues.length>1?`<button class="bp" style="flex:1;background:${clr}" onclick="window._dlgNext()">${dIdx<allDialogues.length-1?'Next Dialogue →':'First Dialogue ↺'}</button>`:''}
      </div>
      ${allRevealed?`<button class="bp" style="width:100%;margin-top:8px;background:var(--ok);color:#fff" onclick="S.screen='sent';render()">Practice these sentences →</button>`:''}
    </div>`;
  }

  window._dlgReveal=i=>{revealed.add(i);d()};
  window._dlgRevealAll=()=>{const dlg=allDialogues[dIdx];for(let i=0;i<dlg.lines.length;i++)revealed.add(i);d()};
  window._dlgReset=()=>{revealed=new Set();d()};
  window._dlgNext=()=>{dIdx=(dIdx+1)%allDialogues.length;revealed=new Set();d()};

  d();
}
// ═══ RANDOM PRACTICE (offline — draws from expanded bank) ═══
function renderAI(){
  const L=LESSONS.find(l=>l.id===S.lessonId);
  if(!L)return;
  const clr=L.level==='HSK1'?'var(--hsk1)':'var(--hsk2)';

  // Gather ALL available sentences: base + extra for this lesson, plus cumulative from prior
  const idx=LESSONS.indexOf(L);
  let pool=[];
  for(let i=0;i<=idx;i++){
    const lid=LESSONS[i].id;
    pool=pool.concat(LESSONS[i].sentences);
    if(EXTRA_SENTENCES[lid]) pool=pool.concat(EXTRA_SENTENCES[lid]);
  }
  // Deduplicate by pinyin
  const seen=new Set();
  pool=pool.filter(s=>{if(seen.has(s.p||s.py))return false;seen.add(s.p||s.py);return true});
  // Normalize: some have .p, some .py
  pool=pool.map(s=>({py:s.py||s.p, en:s.en||s.e, w:s.w}));

  let batch=[], mode='menu', placed=[], avail=[], sIdx=0, res=null, sc=0, batchSize=8, prevRevealed=new Set();

  function genBatch(){
    // Pick batchSize random sentences, prioritizing current lesson
    const thisLesson=[...L.sentences.map(s=>({py:s.p||s.py,en:s.en||s.e,w:s.w}))];
    const extra=(EXTRA_SENTENCES[L.id]||[]).map(s=>({py:s.py,en:s.en,w:s.w}));
    const combined=shuffle([...thisLesson,...extra]);
    const fromPrev=shuffle(pool.filter(s=>!combined.find(c=>c.py===s.py)));
    // Take 5 from current + 3 from previous (or as many as available)
    batch=shuffle([...combined.slice(0,Math.min(5,combined.length)),...fromPrev.slice(0,3)]).slice(0,batchSize);
    if(batch.length===0) batch=shuffle(pool).slice(0,batchSize);
  }

  function initRound(){
    const s=batch[sIdx];
    if(!s||!s.w)return;
    avail=shuffle(s.w.map((w,i)=>({id:i,t:w})));
    placed=[];res=null;
  }

  function d(){
    if(mode==='menu'){
      genBatch();
      app.innerHTML=`
      <div class="header"><button class="back" onclick="S.screen='lesson';render()">←</button><div><div class="t">Random Practice</div><div class="s">${L.level} · Lesson ${L.num}</div></div></div>
      <div style="padding:20px" class="fi">
        <div style="padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px">
          <div style="font-size:13px;color:var(--dim);line-height:1.6">
            Practice with a <strong style="color:var(--text)">random mix</strong> of sentences from this lesson and all previous ones. 
            Each round is different — the sentences are shuffled from a bank of <strong style="color:var(--text)">${pool.length}</strong> sentences.
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="bp" style="width:100%;padding:14px;font-size:15px" onclick="window._rpStart('rearrange')">🧩 Rearrange Words (${batch.length} sentences)</button>
          <button class="bp" style="width:100%;padding:14px;font-size:15px;background:${clr}" onclick="window._rpStart('translate')">✍️ Translate to Pinyin (${batch.length} sentences)</button>
          <button class="bp" style="width:100%;padding:14px;font-size:15px;background:var(--ok);color:#fff" onclick="window._rpStart('mixed')">🎲 Mixed Practice (${batch.length} sentences)</button>
        </div>
        <div style="margin-top:20px">
          <div class="mono" style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.1em">This round's sentences (tap to reveal English)</div>
          ${batch.map((s,i)=>`
            <div style="padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer" onclick="window._rpReveal(${i})">
              <div style="font-size:13px;color:var(--pinyin)">${s.py}</div>
              ${prevRevealed.has(i)?`<div style="font-size:12px;color:var(--dim);margin-top:2px">${s.en}</div>`:`<div style="font-size:11px;color:var(--muted);margin-top:2px">👆 tap to reveal</div>`}
            </div>
          `).join('')}
        </div>
      </div>`;
      return;
    }

    // Practice modes
    if(sIdx>=batch.length){
      app.innerHTML=`
      <div class="header"><button class="back" onclick="window._rpMenu()">←</button><div><div class="t">Round Complete</div></div></div>
      <div style="padding:40px;text-align:center" class="fi">
        <div class="mono" style="font-size:56px;font-weight:900;color:var(--accent)">${sc}/${batch.length}</div>
        <div style="font-size:15px;color:var(--dim);margin-top:8px">${sc>=batch.length*.8?'Excellent!':sc>=batch.length*.5?'Good progress!':'Keep practicing!'}</div>
        <div style="display:flex;gap:8px;margin-top:20px;justify-content:center">
          <button class="bp" onclick="window._rpMenu()">New Round</button>
          <button class="bp" style="background:${clr}" onclick="S.screen='lesson';render()">Back to Lesson</button>
        </div>
      </div>`;
      return;
    }

    const s=batch[sIdx];
    const isRearrange = mode==='rearrange' || (mode==='mixed' && sIdx%2===0);

    if(isRearrange){
      app.innerHTML=`
      <div class="header"><button class="back" onclick="window._rpMenu()">←</button><div><div class="t">Rearrange</div><div class="s">${sIdx+1}/${batch.length} · Score: ${sc}</div></div></div>
      <div class="pbar"><div class="fill" style="width:${((sIdx+1)/batch.length*100)}%"></div></div>
      <div style="padding:20px" class="fi">
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:16px;font-weight:500">${s.en}</div>
          <div style="font-size:13px;color:var(--pinyin);margin-top:4px">${s.py}</div>
        </div>
        <div class="sarea" style="border-color:${res===null?'var(--muted)':res?'var(--ok)':'var(--err)'}">
          ${placed.length===0?'<span style="color:var(--muted);font-size:12px;margin:auto">Tap words to build sentence</span>':''}
          ${placed.map(w=>`<button class="chip" style="background:rgba(240,192,64,.15);border-color:rgba(240,192,64,.35);color:var(--accent)" onclick="window._rpRm(${w.id})">${w.t}</button>`).join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:16px">
          ${avail.map(w=>`<button class="chip" style="background:var(--surface);border-color:var(--border);color:var(--text)" onclick="window._rpAdd(${w.id})">${w.t}</button>`).join('')}
        </div>
        ${res===null?`<button class="bp" style="width:100%" onclick="window._rpChk()" ${placed.length===0?'disabled':''}>Check</button>`:
        `<div style="text-align:center">
          <div style="color:${res?'var(--ok)':'var(--err)'};font-weight:600">${res?'Correct!':'Not quite'}</div>
          ${!res?`<div style="color:var(--dim);font-size:13px;margin-top:4px">${s.w.join(' ')}</div>`:''}
          <button class="bp" style="margin-top:14px" onclick="window._rpNxt()">Next →</button>
        </div>`}
      </div>`;
    } else {
      // Translate mode
      app.innerHTML=`
      <div class="header"><button class="back" onclick="window._rpMenu()">←</button><div><div class="t">Translate</div><div class="s">${sIdx+1}/${batch.length} · Score: ${sc}</div></div></div>
      <div class="pbar"><div class="fill" style="width:${((sIdx+1)/batch.length*100)}%"></div></div>
      <div style="padding:28px 20px;text-align:center" class="fi">
        <div style="font-size:16px;font-weight:600;margin-bottom:20px">${s.en}</div>
        <input id="rpi" class="tinput" style="max-width:380px;border-color:${res===null?'var(--border)':res?'var(--ok)':'var(--err)'}${res!==null?';opacity:.5':''}" placeholder="Type pinyin..." ${res!==null?'readonly':''} onkeydown="if(event.key==='Enter'){${res!==null}?window._rpNxt():window._rpTChk()}">
        ${res===null?`<button class="bp" style="margin-top:10px" onclick="window._rpTChk()">Check</button>`:
        `<div style="margin-top:14px">
          <div style="color:${res?'var(--ok)':'var(--err)'};font-weight:600">${res?'Correct!':'Not quite'}</div>
          ${!res?`<div style="color:var(--dim);margin-top:4px;font-size:13px"><span style="color:var(--pinyin)">${s.py}</span></div>`:''}
          <button class="bp" style="margin-top:14px" onclick="window._rpNxt()">Next →</button>
        </div>`}
      </div>`;
      if(res===null)setTimeout(()=>{const el=$('rpi');if(el)el.focus()},50);
    }
  }

  window._rpMenu=()=>{mode='menu';sIdx=0;sc=0;res=null;prevRevealed=new Set();genBatch();d()};
  window._rpStart=m=>{mode=m;sIdx=0;sc=0;res=null;prevRevealed=new Set();genBatch();initRound();d()};
  window._rpReveal=i=>{prevRevealed.add(i);d()};
  window._rpAdd=id=>{const w=avail.find(x=>x.id===id);if(w){placed.push(w);avail=avail.filter(x=>x.id!==id);d()}};
  window._rpRm=id=>{if(res!==null)return;const w=placed.find(x=>x.id===id);if(w){avail.push(w);placed=placed.filter(x=>x.id!==id);d()}};
  window._rpChk=()=>{
    const s=batch[sIdx];
    res=placed.map(w=>w.t).join('')===s.w.join('');
    if(res)sc++;d();
  };
  window._rpTChk=()=>{
    if(res!==null)return;
    const el=$('rpi');if(!el||!el.value.trim())return;
    const s=batch[sIdx];
    res=el.value.trim().toLowerCase().replace(/\s+/g,' ')===s.py.toLowerCase().replace(/\s+/g,' ');
    if(res)sc++;d();
  };
  window._rpNxt=()=>{sIdx++;res=null;if(sIdx<batch.length)initRound();d()};

  d();
}
